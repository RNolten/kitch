<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitchKitch — Tweedehands keukens</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAFAF7;
      --white: #FFFFFF;
      --black: #1C1C1E;
      --accent: #FF6B35;
      --accent-dark: #E55A25;
      --gray-1: #F2F2F7;
      --gray-2: #E5E5EA;
      --gray-3: #C7C7CC;
      --gray-4: #8E8E93;
      --gray-5: #636366;
      --green: #30D158;
      --red: #FF453A;
      --r-sm: 8px; --r-md: 12px; --r-lg: 16px;
      --sh-sm: 0 1px 3px rgba(0,0,0,0.07);
      --sh-md: 0 4px 16px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--black); min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      background: var(--white); border-bottom: 1px solid var(--gray-2);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo {
      font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
      cursor: pointer; color: var(--black); text-decoration: none;
    }
    .logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .btn {
      padding: 7px 16px; border-radius: 20px; font-size: 14px;
      font-weight: 600; cursor: pointer; border: none;
      transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-ghost { background: var(--gray-1); color: var(--black); }
    .btn-ghost:hover { background: var(--gray-2); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dark); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }
    .btn-danger { background: #FFF0F0; color: var(--red); }
    .btn-danger:hover { background: #FFE0E0; }
    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: white;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    }

    /* LAYOUT */
    main { min-height: calc(100vh - 60px); }
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .page-narrow { max-width: 540px; margin: 0 auto; padding: 32px 24px; }

    /* HERO */
    .hero {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      padding: 72px 24px; text-align: center; color: white;
    }
    .hero-eyebrow {
      font-size: 12px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
    }
    .hero-title {
      font-size: clamp(30px, 5vw, 52px); font-weight: 800;
      letter-spacing: -1.5px; margin-bottom: 14px; line-height: 1.1;
    }
    .hero-title span { color: var(--accent); }
    .hero-sub {
      font-size: 16px; color: rgba(255,255,255,0.6);
      margin-bottom: 36px; line-height: 1.6; max-width: 480px; margin-left: auto; margin-right: auto;
    }
    .hero-cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .hero-btn {
      padding: 13px 28px; border-radius: 28px; font-size: 15px;
      font-weight: 700; cursor: pointer; border: none; transition: all 0.2s;
    }
    .hero-btn-primary { background: var(--accent); color: white; }
    .hero-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,107,53,0.4); }
    .hero-btn-outline { background: transparent; color: white; border: 1.5px solid rgba(255,255,255,0.25); }
    .hero-btn-outline:hover { background: rgba(255,255,255,0.1); }

    /* STATS BAR */
    .stats-bar {
      background: white; border-bottom: 1px solid var(--gray-2);
      padding: 14px 24px; display: flex; justify-content: center; gap: 48px;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 20px; font-weight: 800; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--gray-4); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    /* LISTINGS */
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .section-title { font-size: 20px; font-weight: 800; }
    .section-count { font-size: 14px; color: var(--gray-4); }

    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 20px;
    }
    .listing-card {
      background: white; border-radius: var(--r-lg);
      overflow: hidden; box-shadow: var(--sh-sm);
      cursor: pointer; transition: all 0.2s;
      border: 1px solid var(--gray-2);
    }
    .listing-card:hover { box-shadow: var(--sh-md); transform: translateY(-3px); }
    .listing-img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      background: var(--gray-1); display: flex; align-items: center;
      justify-content: center; font-size: 52px; overflow: hidden;
    }
    .listing-img img { width: 100%; height: 100%; object-fit: cover; }
    .listing-body { padding: 14px 16px 16px; }
    .listing-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .listing-brand { font-size: 13px; color: var(--gray-4); margin-bottom: 10px; }
    .listing-dims { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .dim-tag {
      font-size: 11px; font-weight: 600;
      background: var(--gray-1); color: var(--gray-5);
      padding: 3px 8px; border-radius: 6px;
    }
    .listing-footer { display: flex; align-items: center; justify-content: space-between; }
    .listing-price { font-size: 19px; font-weight: 800; }
    .listing-city { font-size: 12px; color: var(--gray-4); }

    /* EMPTY */
    .empty {
      text-align: center; padding: 80px 24px; color: var(--gray-4);
      grid-column: 1 / -1;
    }
    .empty-icon { font-size: 56px; margin-bottom: 16px; }
    .empty-title { font-size: 18px; font-weight: 700; color: var(--black); margin-bottom: 6px; }
    .empty-text { font-size: 14px; line-height: 1.5; }

    /* DETAIL */
    .detail-grid { display: grid; grid-template-columns: 1fr 360px; gap: 32px; align-items: start; }
    .gallery { border-radius: var(--r-lg); overflow: hidden; background: var(--gray-1); aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; }
    .gallery img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-empty { font-size: 80px; }
    .thumbs { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; }
    .thumb {
      width: 70px; height: 52px; object-fit: cover;
      border-radius: 7px; cursor: pointer; flex-shrink: 0;
      border: 2px solid transparent; transition: border-color 0.15s; opacity: 0.7;
    }
    .thumb.active { border-color: var(--accent); opacity: 1; }

    .sticky-card {
      background: white; border-radius: var(--r-lg); padding: 24px;
      box-shadow: var(--sh-md); border: 1px solid var(--gray-2);
      position: sticky; top: 76px;
    }
    .detail-price { font-size: 34px; font-weight: 800; margin-bottom: 4px; }
    .detail-title { font-size: 21px; font-weight: 700; margin-bottom: 6px; line-height: 1.25; }
    .detail-city { font-size: 14px; color: var(--gray-4); margin-bottom: 18px; }
    .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .spec { background: var(--gray-1); border-radius: var(--r-sm); padding: 10px 12px; }
    .spec-lbl { font-size: 10px; font-weight: 700; color: var(--gray-4); text-transform: uppercase; letter-spacing: 0.6px; }
    .spec-val { font-size: 15px; font-weight: 700; margin-top: 2px; }
    .cta-btn {
      width: 100%; padding: 14px; background: var(--accent); color: white;
      border: none; border-radius: var(--r-md); font-size: 16px; font-weight: 700;
      cursor: pointer; transition: background 0.15s; margin-bottom: 12px;
    }
    .cta-btn:hover { background: var(--accent-dark); }
    .seller-row {
      display: flex; align-items: center; gap: 12px;
      padding-top: 16px; border-top: 1px solid var(--gray-2);
    }
    .seller-av {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--gray-2); color: var(--gray-5);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; flex-shrink: 0;
    }
    .seller-name { font-size: 14px; font-weight: 600; }
    .seller-role { font-size: 12px; color: var(--gray-4); }
    .desc-block { margin-top: 28px; }
    .desc-block h3 { font-size: 16px; font-weight: 700; margin-bottom: 10px; }
    .desc-text { font-size: 14px; color: var(--gray-5); line-height: 1.7; }

    /* FORM */
    .card {
      background: white; border-radius: var(--r-lg); padding: 32px;
      box-shadow: var(--sh-sm); border: 1px solid var(--gray-2);
    }
    .card-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .card-sub { font-size: 14px; color: var(--gray-4); margin-bottom: 28px; line-height: 1.5; }

    .fg { margin-bottom: 18px; }
    .fl {
      display: block; font-size: 11px; font-weight: 700; color: var(--gray-5);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px;
    }
    .fi, .fs, .ft {
      width: 100%; padding: 10px 14px; border: 1.5px solid var(--gray-2);
      border-radius: var(--r-sm); font-size: 15px; font-family: inherit;
      outline: none; transition: border-color 0.15s; background: white;
    }
    .fi:focus, .fs:focus, .ft:focus { border-color: var(--accent); }
    .ft { resize: vertical; min-height: 90px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* PHOTO SLOTS */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; }
    .photo-slot {
      aspect-ratio: 4/3; border: 2px dashed var(--gray-3);
      border-radius: var(--r-sm); display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.15s; overflow: hidden; position: relative;
      background: var(--gray-1);
    }
    .photo-slot:hover { border-color: var(--accent); background: #FFF3EF; }
    .photo-slot.filled { border-style: solid; border-color: var(--gray-2); }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
    .slot-icon { font-size: 22px; }
    .slot-text { font-size: 10px; color: var(--gray-4); margin-top: 4px; }
    .rm-btn {
      position: absolute; top: 4px; right: 4px;
      width: 22px; height: 22px; border-radius: 50%;
      background: rgba(0,0,0,0.55); color: white;
      border: none; cursor: pointer; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }

    .submit-btn {
      width: 100%; padding: 14px; background: var(--accent); color: white;
      border: none; border-radius: var(--r-md); font-size: 16px; font-weight: 700;
      cursor: pointer; margin-top: 8px; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover:not(:disabled) { background: var(--accent-dark); }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* AUTH */
    .tabs { display: flex; margin-bottom: 28px; border-bottom: 1.5px solid var(--gray-2); }
    .tab {
      flex: 1; padding: 12px; text-align: center; font-size: 15px; font-weight: 600;
      cursor: pointer; color: var(--gray-4);
      border-bottom: 2.5px solid transparent; margin-bottom: -1.5px; transition: all 0.15s;
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .role-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 8px; }
    .role-opt {
      border: 2px solid var(--gray-2); border-radius: var(--r-md); padding: 14px 8px;
      text-align: center; cursor: pointer; transition: all 0.15s;
    }
    .role-opt:hover { border-color: var(--accent); }
    .role-opt.sel { border-color: var(--accent); background: #FFF3EF; }
    .role-opt .ri { font-size: 26px; margin-bottom: 6px; }
    .role-opt .rl { font-size: 12px; font-weight: 600; color: var(--gray-5); }

    /* MY ACCOUNT */
    .my-item {
      background: white; border: 1px solid var(--gray-2); border-radius: var(--r-md);
      padding: 14px 16px; display: flex; gap: 14px; align-items: flex-start; margin-bottom: 10px;
    }
    .my-thumb {
      width: 80px; height: 60px; border-radius: 8px; flex-shrink: 0;
      object-fit: cover; background: var(--gray-1);
      display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden;
    }
    .my-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .my-body { flex: 1; min-width: 0; }
    .my-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .my-meta { font-size: 13px; color: var(--gray-4); margin-bottom: 8px; }
    .my-actions { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
    }
    .s-actief { background: #D1FAE5; color: #065F46; }
    .s-gereserveerd { background: #FEF3C7; color: #92400E; }
    .s-verkocht { background: var(--gray-1); color: var(--gray-4); }

    /* MISC */
    .back {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 14px; font-weight: 600; color: var(--gray-5);
      cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 24px;
    }
    .back:hover { color: var(--black); }
    .spin-wrap { display: flex; align-items: center; justify-content: center; padding: 80px; }
    .spin {
      width: 36px; height: 36px; border: 3px solid var(--gray-2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert {
      padding: 11px 14px; border-radius: var(--r-sm); font-size: 14px;
      margin-bottom: 16px; line-height: 1.5;
    }
    .alert-err { background: #FFF0F0; color: #C00; border: 1px solid #FFD0D0; }
    .alert-ok { background: #F0FFF4; color: #065F46; border: 1px solid #BBF7D0; }
    .divider { border: none; border-top: 1px solid var(--gray-2); margin: 20px 0; }

    @media (max-width: 768px) {
      .detail-grid { grid-template-columns: 1fr; }
      .sticky-card { position: static; }
      .stats-bar { gap: 24px; }
    }
    @media (max-width: 540px) {
      nav { padding: 0 16px; }
      .page, .page-narrow { padding: 20px 14px; }
      .card { padding: 20px 16px; }
      .listings-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
      .row3 { grid-template-columns: 1fr; }
      .role-grid { grid-template-columns: 1fr; }
      .hero { padding: 48px 20px; }
    }
  </style>
</head>
<body>
<div id="app"><div class="spin-wrap"><div class="spin"></div></div></div>
<input type="file" id="fileIn" accept="image/*" multiple style="display:none">

<script>
const SB_URL = 'https://eakmmmylfqqjflnacrub.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVha21tbXlsZnFxamZsbmFjcnViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2OTQyOTcsImV4cCI6MjA5NTI3MDI5N30.TcRayQcLsu3Lg2-Fe1HROyvKSfoZQkkOLbR9EJiKB44';
const { createClient } = supabase;
const db = createClient(SB_URL, SB_KEY);

let user = null, profile = null, pendingPhotos = [];

// ── ROUTER ────────────────────────────────────────────────
async function router() {
  const { data: { user: u } } = await db.auth.getUser();
  user = u;
  if (u) {
    const { data } = await db.from('profiles').select('*').eq('id', u.id).single();
    profile = data;
  }

  const hash = location.hash.slice(1) || '/';
  const parts = hash.split('/').filter(Boolean);
  const route = parts[0] || '';
  const param = parts[1];

  const app = document.getElementById('app');
  app.innerHTML = navHTML();
  const main = document.createElement('main');
  app.appendChild(main);

  if (route === '')            await pageHome(main);
  else if (route === 'k')      await pageDetail(main, param);
  else if (route === 'aanbieden') await pageAanbieden(main);
  else if (route === 'login')  await pageLogin(main);
  else if (route === 'mijn')   await pageMijn(main);
  else                         await pageHome(main);
}

const go = p => location.hash = '#' + p;
window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', router);

// ── NAV ───────────────────────────────────────────────────
function navHTML() {
  const init = profile?.name?.[0]?.toUpperCase() || user?.email?.[0]?.toUpperCase() || '';
  return `<nav>
    <div class="logo" onclick="go('')">Kitch<span>Kitch</span></div>
    <div class="nav-right">
      ${user ? `
        <button class="btn btn-primary" onclick="go('aanbieden')">+ Aanbieden</button>
        <div class="nav-avatar" onclick="go('mijn')" title="Mijn account">${init}</div>
      ` : `
        <button class="btn btn-ghost" onclick="go('login')">Inloggen</button>
        <button class="btn btn-primary" onclick="go('aanbieden')">Keuken aanbieden</button>
      `}
    </div>
  </nav>`;
}

// ── HOME ──────────────────────────────────────────────────
async function pageHome(el) {
  el.innerHTML = `
    <div class="hero">
      <div class="hero-eyebrow">Duurzamer wonen</div>
      <div class="hero-title">Geef je keuken een<br><span>tweede leven</span></div>
      <div class="hero-sub">Tweedehands keukens met vakkundige plaatsing.<br>Betaalbaarder, duurzamer, zorgeloos.</div>
      <div class="hero-cta">
        <button class="hero-btn hero-btn-primary" onclick="go('aanbieden')">Keuken aanbieden</button>
        <button class="hero-btn hero-btn-outline" onclick="document.getElementById('ls').scrollIntoView({behavior:'smooth'})">Bekijk keukens ↓</button>
      </div>
    </div>
    <div id="ls" class="page"><div class="spin-wrap"><div class="spin"></div></div></div>`;

  const { data, error } = await db
    .from('listings')
    .select('*, listing_photos(url, order_index)')
    .eq('status', 'actief')
    .order('created_at', { ascending: false });

  const ls = document.getElementById('ls');

  if (error) { ls.innerHTML = err(error.message); return; }

  if (!data?.length) {
    ls.innerHTML = `<div class="listings-grid"><div class="empty">
      <div class="empty-icon">🍳</div>
      <div class="empty-title">Nog geen keukens</div>
      <div class="empty-text">Wees de eerste die een keuken aanbiedt!</div>
    </div></div>`;
    return;
  }

  ls.innerHTML = `
    <div class="section-header">
      <div class="section-title">Beschikbare keukens</div>
      <div class="section-count">${data.length} keuken${data.length !== 1 ? 's' : ''}</div>
    </div>
    <div class="listings-grid">
      ${data.map(l => {
        const photos = sort(l.listing_photos);
        const img = photos[0]?.url;
        return `<div class="listing-card" onclick="go('k/${l.id}')">
          <div class="listing-img">${img ? `<img src="${img}" loading="lazy" alt="">` : '🍳'}</div>
          <div class="listing-body">
            <div class="listing-title">${esc(l.title)}</div>
            <div class="listing-brand">${esc(l.brand || '')}${l.color ? ' · ' + esc(l.color) : ''}</div>
            ${l.width_cm ? `<div class="listing-dims">
              <span class="dim-tag">↔ ${l.width_cm}cm</span>
              ${l.depth_cm ? `<span class="dim-tag">↕ ${l.depth_cm}cm</span>` : ''}
              ${l.height_cm ? `<span class="dim-tag">↑ ${l.height_cm}cm</span>` : ''}
            </div>` : '<div style="height:26px"></div>'}
            <div class="listing-footer">
              <div class="listing-price">€${l.price.toLocaleString('nl')}</div>
              <div class="listing-city">📍 ${esc(l.city || '')}</div>
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>`;
}

// ── DETAIL ────────────────────────────────────────────────
async function pageDetail(el, id) {
  el.innerHTML = `<div class="spin-wrap"><div class="spin"></div></div>`;

  const { data: l, error } = await db
    .from('listings')
    .select('*, listing_photos(url, order_index), profiles(name)')
    .eq('id', id)
    .single();

  if (error || !l) { el.innerHTML = `<div class="page">${err('Keuken niet gevonden.')}</div>`; return; }

  const photos = sort(l.listing_photos);
  let active = 0;

  function galleryHTML() {
    return `
      <div class="gallery" id="mg">
        ${photos.length ? `<img src="${photos[active].url}" alt="">` : `<div class="gallery-empty">🍳</div>`}
      </div>
      ${photos.length > 1 ? `<div class="thumbs">
        ${photos.map((p, i) => `<img src="${p.url}" class="thumb${i === active ? ' active' : ''}" onclick="setPhoto(${i})" alt="">`).join('')}
      </div>` : ''}`;
  }

  window.setPhoto = i => {
    active = i;
    document.getElementById('gw').innerHTML = galleryHTML();
  };

  const sn = l.profiles?.name || 'Aanbieder';
  const specs = [
    l.brand   && { l: 'Merk',    v: l.brand },
    l.color   && { l: 'Kleur',   v: l.color },
    l.width_cm  && { l: 'Breedte', v: l.width_cm + ' cm' },
    l.depth_cm  && { l: 'Diepte',  v: l.depth_cm + ' cm' },
    l.height_cm && { l: 'Hoogte',  v: l.height_cm + ' cm' },
  ].filter(Boolean);

  el.innerHTML = `<div class="page">
    <button class="back" onclick="go('')">← Terug naar overzicht</button>
    <div class="detail-grid">
      <div>
        <div id="gw">${galleryHTML()}</div>
        ${l.description ? `<div class="desc-block">
          <h3>Omschrijving</h3>
          <div class="desc-text">${esc(l.description)}</div>
        </div>` : ''}
      </div>
      <div>
        <div class="sticky-card">
          <div class="detail-price">€${l.price.toLocaleString('nl')}</div>
          <div class="detail-title">${esc(l.title)}</div>
          <div class="detail-city">📍 ${esc(l.city || 'Locatie onbekend')}</div>
          ${specs.length ? `<div class="specs">
            ${specs.map(s => `<div class="spec"><div class="spec-lbl">${s.l}</div><div class="spec-val">${esc(s.v)}</div></div>`).join('')}
          </div>` : ''}
          <button class="cta-btn" onclick="contact('${id}')">Ik ben geïnteresseerd</button>
          <div class="seller-row">
            <div class="seller-av">${sn[0]?.toUpperCase() || '?'}</div>
            <div>
              <div class="seller-name">${esc(sn)}</div>
              <div class="seller-role">Aanbieder</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

window.contact = id => {
  if (!user) { go('login'); return; }
  alert('Contactfunctie komt binnenkort! We sturen jouw interesse door naar de aanbieder.');
};

// ── AANBIEDEN ─────────────────────────────────────────────
async function pageAanbieden(el) {
  if (!user) {
    el.innerHTML = `<div class="page-narrow"><div class="card" style="text-align:center;padding:48px">
      <div style="font-size:48px;margin-bottom:16px">🔑</div>
      <div style="font-size:18px;font-weight:700;margin-bottom:8px">Log eerst in</div>
      <div style="font-size:14px;color:var(--gray-4);margin-bottom:24px">Je hebt een account nodig om een keuken aan te bieden.</div>
      <button class="btn btn-primary" style="margin:0 auto" onclick="go('login')">Inloggen / Registreren</button>
    </div></div>`;
    return;
  }

  pendingPhotos = [];

  el.innerHTML = `<div class="page-narrow"><div class="card">
    <div class="card-title">Keuken aanbieden</div>
    <div class="card-sub">Hoe meer info, hoe sneller je een koper vindt.</div>
    <div id="fa"></div>

    <div class="fg"><label class="fl">Titel *</label>
      <input id="f_t" class="fi" placeholder="Bijv. Witte IKEA Metod keuken, 3 meter" maxlength="100"></div>

    <div class="row2">
      <div class="fg"><label class="fl">Merk</label><input id="f_b" class="fi" placeholder="IKEA, Siematic…"></div>
      <div class="fg"><label class="fl">Kleur</label><input id="f_c" class="fi" placeholder="Wit, antraciet…"></div>
    </div>

    <div class="fg"><label class="fl">Afmetingen (cm)</label>
      <div class="row3">
        <input id="f_w" class="fi" type="number" placeholder="Breedte">
        <input id="f_d" class="fi" type="number" placeholder="Diepte">
        <input id="f_h" class="fi" type="number" placeholder="Hoogte">
      </div>
    </div>

    <div class="fg"><label class="fl">Omschrijving</label>
      <textarea id="f_desc" class="ft" placeholder="Staat van de keuken, wat zit erbij, bijzonderheden…"></textarea>
    </div>

    <div class="row2">
      <div class="fg"><label class="fl">Vraagprijs (€) *</label><input id="f_p" class="fi" type="number" placeholder="500"></div>
      <div class="fg"><label class="fl">Stad *</label><input id="f_city" class="fi" placeholder="Amsterdam"></div>
    </div>

    <div class="fg"><label class="fl">Foto's (max 6)</label>
      <div class="photo-grid" id="pg">${photoGridHTML()}</div>
    </div>

    <button class="submit-btn" id="sb" onclick="submitListing()">Advertentie plaatsen</button>
  </div></div>`;

  document.getElementById('fileIn').onchange = onPhotoSelect;

  el.addEventListener('click', e => {
    const slot = e.target.closest('.photo-slot');
    if (slot && !e.target.closest('.rm-btn') && !slot.classList.contains('filled')) {
      document.getElementById('fileIn').click();
    }
  });
}

function photoGridHTML() {
  return Array.from({ length: 6 }, (_, i) => {
    if (i < pendingPhotos.length) return `
      <div class="photo-slot filled">
        <img src="${pendingPhotos[i].url}" alt="">
        <button class="rm-btn" onclick="rmPhoto(${i})">×</button>
      </div>`;
    if (i === pendingPhotos.length) return `
      <div class="photo-slot">
        <div class="slot-icon">📷</div>
        <div class="slot-text">Toevoegen</div>
      </div>`;
    return `<div class="photo-slot" style="opacity:.3;cursor:default"></div>`;
  }).join('');
}

function onPhotoSelect(e) {
  const left = 6 - pendingPhotos.length;
  Array.from(e.target.files).slice(0, left).forEach(file => {
    const r = new FileReader();
    r.onload = ev => {
      pendingPhotos.push({ file, url: ev.target.result });
      document.getElementById('pg').innerHTML = photoGridHTML();
    };
    r.readAsDataURL(file);
  });
  e.target.value = '';
}

window.rmPhoto = i => {
  pendingPhotos.splice(i, 1);
  document.getElementById('pg').innerHTML = photoGridHTML();
};

window.submitListing = async () => {
  const title = v('f_t'), price = parseInt(v('f_p')), city = v('f_city');
  const fa = document.getElementById('fa');
  if (!title || !price || !city) { fa.innerHTML = err('Vul minimaal een titel, prijs en stad in.'); return; }

  const sb = document.getElementById('sb');
  sb.disabled = true;
  sb.innerHTML = `<div class="spin" style="width:18px;height:18px;border-width:2px"></div> Bezig…`;
  fa.innerHTML = '';

  try {
    const { data: listing, error: le } = await db.from('listings').insert({
      user_id: user.id, title, price, city,
      brand: v('f_b') || null, color: v('f_c') || null,
      width_cm: parseInt(v('f_w')) || null,
      depth_cm: parseInt(v('f_d')) || null,
      height_cm: parseInt(v('f_h')) || null,
      description: v('f_desc') || null,
    }).select().single();
    if (le) throw le;

    for (let i = 0; i < pendingPhotos.length; i++) {
      const { file } = pendingPhotos[i];
      const ext = file.name.split('.').pop();
      const path = `${listing.id}/${i}-${Date.now()}.${ext}`;
      const { error: ue } = await db.storage.from('photos').upload(path, file, { cacheControl: '3600' });
      if (ue) throw ue;
      const { data: { publicUrl } } = db.storage.from('photos').getPublicUrl(path);
      await db.from('listing_photos').insert({ listing_id: listing.id, url: publicUrl, order_index: i });
    }

    go(`k/${listing.id}`);
  } catch (e) {
    fa.innerHTML = err(e.message);
    sb.disabled = false;
    sb.innerHTML = 'Advertentie plaatsen';
  }
};

// ── LOGIN / REGISTER ──────────────────────────────────────
async function pageLogin(el) {
  if (user) { go(''); return; }
  let tab = 'login';

  const draw = () => {
    el.innerHTML = `<div class="page-narrow"><div class="card">
      <div class="tabs">
        <div class="tab${tab==='login'?' active':''}" onclick="setTab('login')">Inloggen</div>
        <div class="tab${tab==='register'?' active':''}" onclick="setTab('register')">Registreren</div>
      </div>
      <div id="aa"></div>
      ${tab==='register' ? `<div class="fg"><label class="fl">Naam</label><input id="a_n" class="fi" placeholder="Jouw naam"></div>` : ''}
      <div class="fg"><label class="fl">E-mailadres</label><input id="a_e" class="fi" type="email" placeholder="jij@email.nl"></div>
      <div class="fg"><label class="fl">Wachtwoord</label><input id="a_p" class="fi" type="password" placeholder="${tab==='register'?'Minimaal 8 tekens':''}"></div>
      ${tab==='register' ? `<div class="fg"><label class="fl">Ik ben een…</label>
        <div class="role-grid">
          <div class="role-opt sel" data-r="koper" onclick="selRole(this)"><div class="ri">🛍️</div><div class="rl">Koper</div></div>
          <div class="role-opt" data-r="aanbieder" onclick="selRole(this)"><div class="ri">🏠</div><div class="rl">Aanbieder</div></div>
          <div class="role-opt" data-r="monteur" onclick="selRole(this)"><div class="ri">🔧</div><div class="rl">Monteur</div></div>
        </div>
      </div>` : ''}
      <button class="submit-btn" id="ab" onclick="doAuth('${tab}')">
        ${tab==='login' ? 'Inloggen' : 'Account aanmaken'}
      </button>
    </div></div>`;
  };

  window.setTab = t => { tab = t; draw(); };
  window.selRole = el => {
    document.querySelectorAll('.role-opt').forEach(r => r.classList.remove('sel'));
    el.classList.add('sel');
  };
  window.doAuth = async mode => {
    const email = v('a_e'), pw = v('a_p'), aa = document.getElementById('aa');
    if (!email || !pw) { aa.innerHTML = err('Vul alle velden in.'); return; }
    const ab = document.getElementById('ab');
    ab.disabled = true; aa.innerHTML = '';
    try {
      if (mode === 'login') {
        const { error: e } = await db.auth.signInWithPassword({ email, password: pw });
        if (e) throw e;
        go('');
      } else {
        const name = v('a_n') || '';
        const role = document.querySelector('.role-opt.sel')?.dataset?.r || 'koper';
        const { data, error: e } = await db.auth.signUp({ email, password: pw, options: { data: { name } } });
        if (e) throw e;
        await db.from('profiles').upsert({ id: data.user.id, name, role });
        aa.innerHTML = `<div class="alert alert-ok">✅ Account aangemaakt! Je kunt nu inloggen.</div>`;
        tab = 'login'; draw();
      }
    } catch (e) { aa.innerHTML = err(e.message); ab.disabled = false; }
  };

  draw();
}

// ── MIJN ACCOUNT ──────────────────────────────────────────
async function pageMijn(el) {
  if (!user) { go('login'); return; }
  el.innerHTML = `<div class="spin-wrap"><div class="spin"></div></div>`;

  const { data } = await db
    .from('listings')
    .select('*, listing_photos(url, order_index)')
    .eq('user_id', user.id)
    .order('created_at', { ascending: false });

  el.innerHTML = `<div class="page">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:28px">
      <div>
        <h1 style="font-size:22px;font-weight:800">Mijn account</h1>
        <div style="font-size:14px;color:var(--gray-4);margin-top:2px">${esc(user.email)}</div>
      </div>
      <button class="btn btn-ghost" onclick="uitloggen()">Uitloggen</button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-size:17px;font-weight:700">Mijn advertenties</h2>
      <button class="btn btn-primary" onclick="go('aanbieden')">+ Toevoegen</button>
    </div>
    ${!data?.length ? `<div class="empty">
      <div class="empty-icon">📦</div>
      <div class="empty-title">Nog geen advertenties</div>
      <div class="empty-text">Bied je eerste keuken aan en bereik kopers door heel Nederland.</div>
    </div>` : data.map(l => {
      const img = sort(l.listing_photos)[0]?.url;
      return `<div class="my-item">
        <div class="my-thumb">${img ? `<img src="${img}" alt="">` : '🍳'}</div>
        <div class="my-body">
          <div class="my-title">${esc(l.title)}</div>
          <div class="my-meta">€${l.price.toLocaleString('nl')} · ${esc(l.city || '')} · ${fmtDate(l.created_at)}</div>
          <div class="my-actions">
            <span class="status-badge s-${l.status}">${l.status}</span>
            <button class="btn btn-ghost btn-sm" onclick="go('k/${l.id}')">Bekijken</button>
            <button class="btn btn-danger btn-sm" onclick="delListing('${l.id}')">Verwijderen</button>
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

window.uitloggen = async () => {
  await db.auth.signOut();
  user = null; profile = null;
  go('');
};
window.delListing = async id => {
  if (!confirm('Weet je zeker dat je deze advertentie wilt verwijderen?')) return;
  await db.from('listings').delete().eq('id', id);
  go('mijn');
};

// ── HELPERS ───────────────────────────────────────────────
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
const v   = id => document.getElementById(id)?.value?.trim() || '';
const err = msg => `<div class="alert alert-err">⚠️ ${msg}</div>`;
const sort = arr => (arr || []).slice().sort((a,b) => a.order_index - b.order_index);
const fmtDate = iso => iso ? new Date(iso).toLocaleDateString('nl-NL', { day:'numeric', month:'short', year:'numeric' }) : '';

router();
</script>
</body>
</html>
