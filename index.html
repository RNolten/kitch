<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KitchKatch — Tweedehands keukens</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 40 44' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect x='1' y='1' width='38' height='42' rx='3' fill='%23FF6B35' stroke='%23111' stroke-width='2.5'/%3E%3Crect x='1' y='1' width='38' height='20' rx='3' fill='%23FF8C5A' stroke='%23111' stroke-width='2.5'/%3E%3Cline x1='1' y1='21' x2='39' y2='21' stroke='%23111' stroke-width='2.5'/%3E%3Ccircle cx='13' cy='11' r='3' fill='%23111'/%3E%3Ccircle cx='27' cy='11' r='3' fill='%23111'/%3E%3Cpath d='M10 34 Q20 41 30 34' stroke='%23111' stroke-width='2.5' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FFFFFF;
      --white: #FFFFFF;
      --black: #000000;
      --accent: #FF6B35;
      --accent-dark: #E05520;
      --accent-light: #FFF0E8;
      --gray-1: #F5F5F5;
      --gray-2: #E4E4E4;
      --gray-3: #BDBDBD;
      --gray-4: #888888;
      --gray-5: #555555;
      --green: #28C940;
      --red: #F84F31;
      --r-sm: 6px; --r-md: 8px; --r-lg: 10px;
      --sh-sm: 3px 3px 0 #000;
      --sh-md: 5px 5px 0 #000;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--black); min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      background: var(--white); border-bottom: 2px solid var(--black);
      padding: 0 24px; height: 62px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { cursor: pointer; display: flex; align-items: center; line-height: 1; }
    .logo svg { height: 34px; width: auto; display: block; }
    .nav-right { display: flex; align-items: center; gap: 10px; }
    .btn {
      padding: 7px 16px; border-radius: var(--r-sm); font-size: 14px;
      font-weight: 700; cursor: pointer; border: 2px solid var(--black);
      transition: all 0.1s; display: inline-flex; align-items: center; gap: 6px;
      box-shadow: 2px 2px 0 var(--black);
    }
    .btn:hover:not(:disabled) { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--black); }
    .btn:active:not(:disabled) { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--black); }
    .btn-ghost { background: white; color: var(--black); }
    .btn-ghost:hover:not(:disabled) { background: var(--gray-1); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dark); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; transform: none; }
    .btn-sm { padding: 4px 12px; font-size: 12px; box-shadow: 2px 2px 0 var(--black); }
    .btn-danger { background: #FFF0F0; color: var(--red); border-color: var(--red); box-shadow: 2px 2px 0 var(--red); }
    .btn-danger:hover:not(:disabled) { background: #FFE0E0; box-shadow: 3px 3px 0 var(--red); }
    .nav-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); color: white; border: 2px solid var(--black);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0;
    }

    /* LAYOUT */
    main { min-height: calc(100vh - 62px); }
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
    .page-narrow { max-width: 540px; margin: 0 auto; padding: 32px 24px; }

    /* HERO */
    .hero {
      background: #FFF8F4; border-bottom: 2px solid var(--black);
      padding: 72px 24px; text-align: center;
    }
    .hero-eyebrow {
      font-size: 12px; font-weight: 800; letter-spacing: 2px;
      text-transform: uppercase; color: var(--accent); margin-bottom: 16px;
    }
    .hero-title {
      font-size: clamp(32px, 5vw, 60px); font-weight: 900;
      letter-spacing: -2.5px; margin-bottom: 14px; line-height: 1.0; color: var(--black);
    }
    .hero-title span { color: var(--accent); }
    .hero-sub {
      font-size: 17px; color: var(--gray-5);
      margin-bottom: 36px; line-height: 1.6; max-width: 460px; margin-left: auto; margin-right: auto;
    }
    .hero-cta { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .hero-btn {
      padding: 13px 28px; border-radius: var(--r-sm); font-size: 16px;
      font-weight: 800; cursor: pointer; border: 2px solid var(--black);
      transition: all 0.1s; box-shadow: 4px 4px 0 var(--black);
    }
    .hero-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--black); }
    .hero-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--black); }
    .hero-btn-primary { background: var(--accent); color: white; }
    .hero-btn-outline { background: white; color: var(--black); }

    /* STATS BAR */
    .stats-bar {
      background: var(--accent-light); border-bottom: 2px solid var(--black);
      padding: 14px 24px; display: flex; justify-content: center; gap: 48px;
    }
    .stat { text-align: center; }
    .stat-num { font-size: 22px; font-weight: 900; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--gray-5); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

    /* LISTINGS */
    .section-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px;
    }
    .section-title { font-size: 22px; font-weight: 900; letter-spacing: -0.5px; }
    .section-count { font-size: 14px; color: var(--gray-4); font-weight: 600; }

    .listings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 20px;
    }
    .listing-card {
      background: white; border-radius: var(--r-md);
      overflow: hidden; cursor: pointer; transition: all 0.1s;
      border: 2px solid var(--black); box-shadow: var(--sh-sm);
    }
    .listing-card:hover { box-shadow: var(--sh-md); transform: translate(-2px,-2px); }
    .listing-img {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      background: var(--gray-1); display: flex; align-items: center;
      justify-content: center; font-size: 52px; overflow: hidden;
      border-bottom: 2px solid var(--black);
    }
    .listing-img img { width: 100%; height: 100%; object-fit: cover; }
    .listing-body { padding: 14px 16px 16px; }
    .listing-title { font-size: 15px; font-weight: 800; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .listing-brand { font-size: 13px; color: var(--gray-4); margin-bottom: 10px; font-weight: 600; }
    .listing-dims { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .dim-tag {
      font-size: 11px; font-weight: 700;
      background: var(--gray-1); color: var(--gray-5);
      padding: 3px 8px; border-radius: 4px; border: 1px solid var(--gray-3);
    }
    .listing-footer { display: flex; align-items: center; justify-content: space-between; }
    .listing-price { font-size: 20px; font-weight: 900; }
    .listing-city { font-size: 12px; color: var(--gray-4); font-weight: 600; }

    /* EMPTY */
    .empty {
      text-align: center; padding: 80px 24px; color: var(--gray-4);
      grid-column: 1 / -1;
    }
    .empty-icon { font-size: 56px; margin-bottom: 16px; }
    .empty-title { font-size: 20px; font-weight: 900; color: var(--black); margin-bottom: 6px; }
    .empty-text { font-size: 14px; line-height: 1.5; }

    /* DETAIL */
    .detail-grid { display: grid; grid-template-columns: 1fr 360px; gap: 32px; align-items: start; }
    .gallery { border-radius: var(--r-md); overflow: hidden; background: var(--gray-1); aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; border: 2px solid var(--black); }
    .gallery img { width: 100%; height: 100%; object-fit: cover; }
    .gallery-empty { font-size: 80px; }
    .thumbs { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; }
    .thumb {
      width: 70px; height: 52px; object-fit: cover;
      border-radius: 5px; cursor: pointer; flex-shrink: 0;
      border: 2px solid var(--gray-3); transition: border-color 0.1s; opacity: 0.7;
    }
    .thumb.active { border-color: var(--black); opacity: 1; }

    .sticky-card {
      background: white; border-radius: var(--r-md); padding: 24px;
      border: 2px solid var(--black); box-shadow: var(--sh-md);
      position: sticky; top: 78px;
    }
    .detail-price { font-size: 36px; font-weight: 900; margin-bottom: 4px; letter-spacing: -1px; }
    .detail-title { font-size: 22px; font-weight: 800; margin-bottom: 6px; line-height: 1.2; }
    .detail-city { font-size: 14px; color: var(--gray-4); margin-bottom: 18px; font-weight: 600; }
    .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
    .spec { background: var(--gray-1); border-radius: var(--r-sm); padding: 10px 12px; border: 1px solid var(--gray-2); }
    .spec-lbl { font-size: 10px; font-weight: 800; color: var(--gray-4); text-transform: uppercase; letter-spacing: 0.6px; }
    .spec-val { font-size: 15px; font-weight: 800; margin-top: 2px; }
    .cta-btn {
      width: 100%; padding: 14px; background: var(--accent); color: white;
      border: 2px solid var(--black); border-radius: var(--r-sm); font-size: 16px; font-weight: 800;
      cursor: pointer; transition: all 0.1s; margin-bottom: 12px;
      box-shadow: 3px 3px 0 var(--black);
    }
    .cta-btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--black); }
    .cta-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--black); }
    .seller-row {
      display: flex; align-items: center; gap: 12px;
      padding-top: 16px; border-top: 2px solid var(--black);
    }
    .seller-av {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--gray-1); color: var(--gray-5); border: 2px solid var(--black);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 700; flex-shrink: 0;
    }
    .seller-name { font-size: 14px; font-weight: 700; }
    .seller-role { font-size: 12px; color: var(--gray-4); font-weight: 600; }
    .desc-block { margin-top: 28px; }
    .desc-block h3 { font-size: 17px; font-weight: 800; margin-bottom: 10px; }
    .desc-text { font-size: 14px; color: var(--gray-5); line-height: 1.7; }

    /* FORM */
    .card {
      background: white; border-radius: var(--r-lg); padding: 32px;
      border: 2px solid var(--black); box-shadow: var(--sh-sm);
    }
    .card-title { font-size: 24px; font-weight: 900; margin-bottom: 6px; letter-spacing: -0.5px; }
    .card-sub { font-size: 14px; color: var(--gray-4); margin-bottom: 28px; line-height: 1.5; }

    .fg { margin-bottom: 18px; }
    .fl {
      display: block; font-size: 11px; font-weight: 800; color: var(--gray-5);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 7px;
    }
    .fi, .fs, .ft {
      width: 100%; padding: 10px 14px; border: 2px solid var(--gray-3);
      border-radius: var(--r-sm); font-size: 15px; font-family: inherit;
      outline: none; transition: border-color 0.1s; background: white;
    }
    .fi:focus, .fs:focus, .ft:focus { border-color: var(--black); }
    .ft { resize: vertical; min-height: 90px; }
    .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* PHOTO SLOTS */
    .photo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 8px; }
    .photo-slot {
      aspect-ratio: 4/3; border: 2px dashed var(--gray-3);
      border-radius: var(--r-sm); display: flex; flex-direction: column;
      align-items: center; justify-content: center; cursor: pointer;
      transition: all 0.1s; overflow: hidden; position: relative;
      background: var(--gray-1);
    }
    .photo-slot:hover { border-color: var(--black); border-style: solid; background: var(--accent-light); }
    .photo-slot.filled { border-style: solid; border-color: var(--black); }
    .photo-slot img { width: 100%; height: 100%; object-fit: cover; }
    .slot-icon { font-size: 22px; }
    .slot-text { font-size: 10px; color: var(--gray-4); margin-top: 4px; font-weight: 600; }
    .rm-btn {
      position: absolute; top: 4px; right: 4px;
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--black); color: white;
      border: none; cursor: pointer; font-size: 13px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; line-height: 1;
    }

    .submit-btn {
      width: 100%; padding: 14px; background: var(--accent); color: white;
      border: 2px solid var(--black); border-radius: var(--r-sm); font-size: 16px; font-weight: 800;
      cursor: pointer; margin-top: 8px; transition: all 0.1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 4px 4px 0 var(--black);
    }
    .submit-btn:hover:not(:disabled) { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--black); }
    .submit-btn:active:not(:disabled) { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--black); }
    .submit-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; transform: none; }

    /* AUTH */
    .tabs { display: flex; margin-bottom: 28px; border-bottom: 2px solid var(--black); }
    .tab {
      flex: 1; padding: 12px; text-align: center; font-size: 15px; font-weight: 700;
      cursor: pointer; color: var(--gray-4);
      border-bottom: 3px solid transparent; margin-bottom: -2px; transition: all 0.15s;
    }
    .tab.active { color: var(--black); border-bottom-color: var(--black); }
    .role-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 8px; }
    .role-opt {
      border: 2px solid var(--gray-3); border-radius: var(--r-md); padding: 14px 8px;
      text-align: center; cursor: pointer; transition: all 0.1s;
    }
    .role-opt:hover { border-color: var(--black); box-shadow: 2px 2px 0 var(--black); }
    .role-opt.sel { border-color: var(--black); background: var(--accent-light); box-shadow: 3px 3px 0 var(--black); }
    .role-opt .ri { font-size: 26px; margin-bottom: 6px; }
    .role-opt .rl { font-size: 12px; font-weight: 700; color: var(--gray-5); }

    /* MY ACCOUNT */
    .my-item {
      background: white; border: 2px solid var(--black); border-radius: var(--r-md);
      padding: 14px 16px; display: flex; gap: 14px; align-items: flex-start;
      margin-bottom: 12px; box-shadow: 3px 3px 0 var(--black);
    }
    .my-thumb {
      width: 80px; height: 60px; border-radius: 6px; flex-shrink: 0;
      object-fit: cover; background: var(--gray-1); border: 2px solid var(--black);
      display: flex; align-items: center; justify-content: center; font-size: 22px; overflow: hidden;
    }
    .my-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .my-body { flex: 1; min-width: 0; }
    .my-title { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
    .my-meta { font-size: 13px; color: var(--gray-4); margin-bottom: 8px; font-weight: 600; }
    .my-actions { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
    .status-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 700;
      border: 1.5px solid currentColor;
    }
    .s-actief { background: #D1FAE5; color: #065F46; }
    .s-gereserveerd { background: #FEF3C7; color: #92400E; }
    .s-verkocht { background: var(--gray-1); color: var(--gray-4); }

    /* MISC */
    .back {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 14px; font-weight: 700; color: var(--gray-5);
      cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 24px;
    }
    .back:hover { color: var(--black); }
    .spin-wrap { display: flex; align-items: center; justify-content: center; padding: 80px; }
    .spin {
      width: 36px; height: 36px; border: 3px solid var(--gray-2);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin .75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert {
      padding: 11px 14px; border-radius: var(--r-sm); font-size: 14px;
      margin-bottom: 16px; line-height: 1.5; border: 2px solid;
    }
    .alert-err { background: #FFF0F0; color: #C00; border-color: #C00; }
    .alert-ok { background: #F0FFF4; color: #065F46; border-color: #065F46; }
    .divider { border: none; border-top: 2px solid var(--black); margin: 20px 0; }

    /* FORM PAGE */
    .page-form { max-width: 660px; margin: 0 auto; padding: 32px 24px; }
    .form-card {
      background: white; border-radius: var(--r-md); padding: 28px 32px;
      border: 2px solid var(--black); box-shadow: var(--sh-sm); margin-bottom: 16px;
    }
    .form-card-title {
      font-size: 11px; font-weight: 900; text-transform: uppercase;
      letter-spacing: 1px; color: var(--gray-4); margin-bottom: 20px;
      display: flex; align-items: center; gap: 6px;
    }

    /* CHIP SELECTOR */
    .chip-group { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .chip {
      padding: 7px 14px; border-radius: var(--r-sm); font-size: 13px; font-weight: 700;
      border: 2px solid var(--gray-3); background: white; cursor: pointer;
      transition: all 0.1s; color: var(--gray-5); user-select: none;
    }
    .chip:hover { border-color: var(--black); color: var(--black); box-shadow: 2px 2px 0 var(--black); }
    .chip.sel { border-color: var(--black); background: var(--accent-light); color: var(--black); box-shadow: 2px 2px 0 var(--black); }

    /* CHECKBOX GRID */
    .check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
    .check-item {
      display: flex; align-items: center; gap: 9px; padding: 9px 12px;
      border-radius: var(--r-sm); background: var(--gray-1); cursor: pointer;
      font-size: 13px; font-weight: 600; user-select: none; transition: all 0.1s;
      border: 1.5px solid var(--gray-2);
    }
    .check-item:has(input:checked) { background: var(--accent-light); border-color: var(--black); }
    .check-item input[type=checkbox] {
      accent-color: var(--black); width: 15px; height: 15px;
      cursor: pointer; flex-shrink: 0;
    }

    /* TOGGLE ROW */
    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 13px 0; border-bottom: 1px solid var(--gray-2);
    }
    .toggle-row:last-child { border-bottom: none; padding-bottom: 0; }
    .toggle-label { font-size: 14px; font-weight: 700; }
    .toggle-sub { font-size: 12px; color: var(--gray-4); margin-top: 2px; }
    .toggle {
      width: 44px; height: 26px; border-radius: 13px; background: var(--gray-3);
      border: 2px solid var(--black); cursor: pointer; position: relative; transition: background 0.2s;
      flex-shrink: 0;
    }
    .toggle.on { background: var(--accent); }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 18px; height: 18px; border-radius: 50%; background: white;
      transition: transform 0.2s; box-shadow: 0 1px 2px rgba(0,0,0,0.25);
    }
    .toggle.on::after { transform: translateX(18px); }

    /* TEKENINGEN UPLOAD */
    .tekening-drop {
      border: 2px dashed var(--gray-3); border-radius: var(--r-md);
      padding: 24px; text-align: center; cursor: pointer;
      transition: all 0.1s; background: var(--gray-1);
    }
    .tekening-drop:hover { border-color: var(--black); border-style: solid; background: var(--accent-light); }
    .tekening-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .tekening-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px; background: var(--gray-1); border-radius: var(--r-sm);
      font-size: 13px; font-weight: 600; border: 1.5px solid var(--gray-2);
    }

    /* APPARATUUR TAGS (detail page) */
    .app-tags { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 10px; }
    .app-tag {
      padding: 5px 12px; border-radius: 4px; font-size: 12px; font-weight: 700;
      background: white; color: var(--black); border: 1.5px solid var(--black);
    }

    /* UITLEG SECTIE */
    .uitleg {
      border-top: 2px solid var(--black); background: white;
      padding: 72px 24px;
    }
    .uitleg-inner { max-width: 1100px; margin: 0 auto; }
    .uitleg-heading {
      font-size: clamp(24px, 3.5vw, 40px); font-weight: 900;
      letter-spacing: -1.5px; margin-bottom: 48px; line-height: 1.1;
    }
    .uitleg-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;
    }
    .uitleg-card {
      border: 2px solid var(--black); border-radius: var(--r-md);
      padding: 28px; box-shadow: var(--sh-sm); background: white;
    }
    .uitleg-card-accent { background: var(--accent-light); }
    .uitleg-icon { font-size: 36px; margin-bottom: 16px; }
    .uitleg-card-title { font-size: 18px; font-weight: 900; margin-bottom: 10px; letter-spacing: -0.3px; }

const MATERIAAL_INFO = {
  'Composiet':  'mix van kwarts en hars — steenhard, hittebestendig en krasbestendig',
  'Graniet':    'natuursteen — uniek patroon, robuust en duurzaam',
  'Quartz':     'engineered stone — onderhoudsvriendelijk en niet-poreus',
  'Marmer':     'luxe natuursteen — gevoelig voor zuren en vlekken',
  'Laminaat':   'goedkoop en licht — gevoelig voor vocht en krassen',
  'Hout':       'warm en natuurlijk — vraagt regelmatig onderhoud',
  'RVS':        'roestvrij staal — professionele uitstraling en krasbestendig',
  'Beton':      'industriële look — poreus, behandeling vereist',
  'Dekton':     'ultra-compact keramisch oppervlak — extreem hittebestendig',
  'Keramiek':   'gebakken aardewerk of porselein — hittebestendig en makkelijk schoon',
  'Glas':       'modern en glad — breekbaar en gevoelig voor krassen',
  'HPL':        'High Pressure Laminate — slijtvast en vochtbestendig',
  'Corian':     'acrylaat solid surface — naadloos aan te brengen en repareerbaar',
};

function buildAutoSummary(l, d) {
  if (!d) return '';
  const naam = [l.brand, d.type_model, l.color].filter(Boolean).join(' ');
  const vormNaam = d.vorm || l.keuken_type;
  const parts = [];

  // Intro
  let intro = naam || 'Deze keuken';
  if (vormNaam) {
    const vl = vormNaam.toLowerCase();
    if (vl === 'rechte keuken') intro += ` is een rechte opstelling`;
    else if (vl === 'overig') intro += ` heeft een bijzondere indeling`;
    else intro += ` is een ${vl}opstelling`;
  }
  if (d.buitenmaten) intro += ` van ${d.buitenmaten}`;
  const stDelen = [
    l.leeftijd_jaar ? `${l.leeftijd_jaar} jaar oud` : null,
    l.conditie ? `in ${l.conditie.toLowerCase()} staat` : null,
  ].filter(Boolean);
  if (stDelen.length) intro += `, ${stDelen.join(' en ')}`;
  parts.push(intro + '.');

  // Aanrechtblad
  if (d.blad_materiaal) {
    const info = MATERIAAL_INFO[d.blad_materiaal];
    let s = `Het aanrechtblad is van ${d.blad_materiaal.toLowerCase()}`;
    if (info) {
      const uitleg = info.includes(' — ') ? info.split(' — ')[1] : info;
      s += ` — ${uitleg}`;
    }
    if (d.blad_dikte) s += `, ${d.blad_dikte} mm dik`;
    const extras = [d.achterwand && 'achterwand', d.spatrand && 'spatrand'].filter(Boolean);
    if (extras.length) s += `. Er ${extras.length > 1 ? 'zijn een' : 'is een'} ${extras.join(' en ')} inbegrepen`;
    parts.push(s + '.');
  }

  // Kasten
  const kastenTotaal = (d.kasten_onder || 0) + (d.kasten_boven || 0) + (d.kasten_hoog || 0);
  if (kastenTotaal > 0) {
    const extras = [
      d.kasten_softclose && 'soft-close scharnieren',
      d.kasten_verlichting && 'ingebouwde verlichting',
      d.kasten_greep === 'Greeploos' && 'een strakke greeplose look',
    ].filter(Boolean);
    let s = `Er zijn ${kastenTotaal} kasten`;
    if (d.kasten_hoogte) s += ` tot ${d.kasten_hoogte} cm hoog`;
    if (extras.length) s += `, uitgerust met ${extras.join(' en ')}`;
    parts.push(s + '.');
  }

  // Spoelbak + Kraan
  const spKr = [
    d.spoelbak_materiaal && `een ${d.spoelbak_config === 'Dubbel' ? 'dubbele ' : ''}${d.spoelbak_materiaal.toLowerCase()} spoelbak`,
    d.kraan_kleur && `een ${d.kraan_kleur.toLowerCase()} kraan${d.kraan_kokend ? ' met kokendwaterfunctie' : ''}`,
  ].filter(Boolean);
  if (spKr.length) parts.push(`Inbegrepen: ${spKr.join(' en ')}.`);

  return parts.join(' ');
}

function waNum(num) {
  const clean = num.replace(/\D/g, '');
  if (clean.startsWith('0')) return '31' + clean.slice(1);
  if (clean.startsWith('31')) return clean;
  return clean;
}

window.selChip = el => {
  const group = el.getAttribute('data-group');
  const was = el.classList.contains('sel');
  document.querySelectorAll(`.chip[data-group="${group}"]`).forEach(c => c.classList.remove('sel'));
  if (!was) el.classList.add('sel');
  window.updateAutoTitle?.();
  window.updateAutoSummary?.();
};

window.updateAutoTitle = () => {
  const merk = v('f_merk'), type = v('f_type'), kleur = v('f_kleur');
  const parts = [merk, type, kleur].filter(Boolean);
  const preview = document.getElementById('title-preview');
  if (preview) {
    if (parts.length) {
      preview.innerHTML = `Advertentietitel: <span>${esc(parts.join(' '))}</span>`;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  }
  window.updateAutoSummary?.();
};

function _buildFormSummary() {
  const chipValF = g => document.querySelector(`.chip[data-group="${g}"].sel`)?.getAttribute('data-val') || null;
  const isOnF = id => document.getElementById(id)?.classList.contains('on') || false;
  const fakeL = {
    brand: v('f_merk'), color: v('f_kleur'),
    leeftijd_jaar: parseInt(v('f_age')) || null,
    conditie: chipValF('conditie'), keuken_type: chipValF('keuken_type'),
  };
  const fakeD = {
    type_model: v('f_type'), vorm: chipValF('keuken_type'),
    buitenmaten: v('f_buitenmaten'),
    blad_materiaal: chipValF('materiaal_blad'),
    blad_dikte: parseInt(v('f_blad_dikte')) || null,
    achterwand: isOnF('tgl_achterwand'), spatrand: isOnF('tgl_spatrand'),
    spoelbak_materiaal: chipValF('spoelbak_materiaal'),
    spoelbak_config: chipValF('spoelbak_config'),
    kraan_kleur: v('f_kraan_kleur'), kraan_kokend: isOnF('tgl_kokend'),
    kasten_onder: parseInt(v('f_kasten_onder')) || null,
    kasten_boven: parseInt(v('f_kasten_boven')) || null,
    kasten_hoog:  parseInt(v('f_kasten_hoog'))  || null,
    kasten_hoogte: parseInt(v('f_kasten_hoogte')) || null,
    kasten_softclose: isOnF('tgl_softclose'), kasten_verlichting: isOnF('tgl_verlichting'),
    kasten_greep: chipValF('kasten_greep'),
  };
  return buildAutoSummary(fakeL, fakeD);
}

window.updateAutoSummary = () => {
  const ta = document.getElementById('summary-text');
  if (!ta || window._summaryEdited) return;  // niet overschrijven als handmatig bewerkt
  const text = _buildFormSummary();
  ta.value = text || '';
  ta.placeholder = text ? '' : 'Vul meer velden in voor een samenvatting…';
};

window.regenerateSummary = () => {
  const ta = document.getElementById('summary-text');
  if (!ta) return;
  window._summaryEdited = false;
  const text = _buildFormSummary();
  ta.value = text || '';
  ta.placeholder = text ? '' : 'Vul meer velden in voor een samenvatting…';
};

window.triggerSectionPhoto = section => {
  currentSectionUpload = section;
  document.getElementById('fileInSection').click();
};

function onSectionPhotoSelect(e) {
  const section = currentSectionUpload;
  if (!section || !pendingSectionPhotos[section]) return;
  const photos = pendingSectionPhotos[section];
  const left = 6 - photos.length;
  Array.from(e.target.files).slice(0, left).forEach(file => {
    const r = new FileReader();
    r.onload = ev => {
      photos.push({ file, url: ev.target.result });
      renderSectionPhotoRow(section);
    };
    r.readAsDataURL(file);
  });
  e.target.value = '';
}

function renderSectionPhotoRow(section) {
  const el = document.getElementById(`spr-${section}`);
  if (!el) return;
  const photos = pendingSectionPhotos[section] || [];
  const thumbs = photos.map((p, i) => `<div class="spr-thumb">
    <img src="${p.url}" alt="">
    ${!p.existing ? `<button class="spr-rm" onclick="rmSectionPhoto('${section}',${i})">×</button>` : ''}
  </div>`).join('');
  const addBtn = photos.length < 6
    ? `<button type="button" class="spr-add" onclick="triggerSectionPhoto('${section}')">📷 Foto's toevoegen</button>`
    : '';
  el.innerHTML = thumbs + addBtn;
}

window.rmSectionPhoto = (section, i) => {
  if (pendingSectionPhotos[section]) {
    pendingSectionPhotos[section].splice(i, 1);
    renderSectionPhotoRow(section);
  }
};

window.toggleBtn = id => {
  document.getElementById(id).classList.toggle('on');
  window.updateAutoSummary?.();
};

function onTekeningSel(e) {
  const left = 5 - pendingTekeningen.length;
  Array.from(e.target.files).slice(0, left).forEach(file => {
    pendingTekeningen.push({ file });
    renderTekenList();
  });
  e.target.value = '';
}

function renderTekenList() {
  const tl = document.getElementById('tl');
  if (!tl) return;
  tl.innerHTML = pendingTekeningen.map((t, i) =>
    `<div class="tekening-item">
      <span>📄 ${esc(t.file?.name || t.name || 'Tekening')}</span>
      ${!t.existing ? `<button onclick="rmTekening(${i})" style="background:none;border:none;cursor:pointer;color:var(--gray-4);font-size:18px;line-height:1;padding:0 2px">×</button>` : ''}
    </div>`
  ).join('');
}

window.rmTekening = i => {
  pendingTekeningen.splice(i, 1);
  renderTekenList();
};

function renderApparaatList() {
  const el = document.getElementById('app-list');
  if (!el) return;
  el.innerHTML = pendingApparatuur.length ? pendingApparatuur.map((a, i) => `
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
      padding:10px 12px;background:white;border:1px solid var(--gray-2);border-radius:var(--r-sm);margin-bottom:8px">
      <div>
        <div style="font-size:14px;font-weight:700">✓ ${esc(a.type)}${a.montage ? ` <span style="font-size:12px;font-weight:600;color:var(--gray-4)">(${esc(a.montage)})</span>` : ''}</div>
        ${[a.merk, a.kleur, a.kenmerken].filter(Boolean).length ? `
          <div style="font-size:12px;color:var(--gray-4);margin-top:3px">
            ${[a.merk, a.kleur, a.kenmerken].filter(Boolean).map(t => esc(t)).join(' · ')}
          </div>` : ''}
      </div>
      <button onclick="rmApparaat(${i})" style="background:none;border:none;cursor:pointer;color:var(--gray-4);font-size:18px;padding:0 2px;flex-shrink:0;line-height:1">×</button>
    </div>`).join('') : '';

window.addApparaat = () => {
  const type = document.getElementById('app_type')?.value;
  if (!type) { alert('Kies eerst een type apparaat.'); return; }
  pendingApparatuur.push({
    type,
    merk:      document.getElementById('app_merk')?.value.trim()    || '',
    kleur:     document.getElementById('app_kleur')?.value.trim()   || '',
    kenmerken: document.getElementById('app_kenm')?.value.trim()    || '',
    montage:   document.getElementById('app_montage')?.value.trim() || '',
  });
  ['app_type','app_merk','app_kleur','app_kenm','app_montage'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  renderApparaatList();
};

window.rmApparaat = i => {
  pendingApparatuur.splice(i, 1);
  renderApparaatList();
};

function photoGridHTML() {
  return Array.from({ length: 6 }, (_, i) => {
    if (i < pendingPhotos.length) {
      const p = pendingPhotos[i];
      return `<div class="photo-slot filled">
        <img src="${p.url}" alt="">
        ${!p.existing ? `<button class="rm-btn" onclick="rmPhoto(${i})">×</button>` : ''}
      </div>`;
    }
    if (i === pendingPhotos.length) return `
      <div class="photo-slot">
        <div class="slot-icon">📷</div>
        <div class="slot-text">Toevoegen</div>
      </div>`;
    return `<div class="photo-slot" style="opacity:.3;cursor:default"></div>`;
  }).join('');
}

function onPhotoSelect(e) {
  const left = 6 - pendingPhotos.length;
  Array.from(e.target.files).slice(0, left).forEach(file => {
    const r = new FileReader();
    r.onload = ev => {
      pendingPhotos.push({ file, url: ev.target.result });
      document.getElementById('pg').innerHTML = photoGridHTML();
    };
    r.readAsDataURL(file);
  });
  e.target.value = '';
}

window.rmPhoto = i => {
  pendingPhotos.splice(i, 1);
  document.getElementById('pg').innerHTML = photoGridHTML();
};

window.submitListing = async () => {
  const merk = v('f_merk'), typeModel = v('f_type'), kleur = v('f_kleur');
  const title = [merk, typeModel, kleur].filter(Boolean).join(' ') || 'Keuken';
  const price = parseInt(v('f_p')), city = v('f_city');
  const fa = document.getElementById('fa');
  if (!price || !city) {
    fa.innerHTML = err('Vul minimaal een prijs en stad in.');
    fa.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const chipVal = group =>
    document.querySelector(`.chip[data-group="${group}"].sel`)?.getAttribute('data-val') || null;
  const isOn = id => document.getElementById(id)?.classList.contains('on') || false;

  // Alle details in één JSON object
  const details = {
    type_model: typeModel || null,
    vorm: chipVal('keuken_type'),
    buitenmaten: v('f_buitenmaten') || null,
    kenmerken_notitie: v('f_kenmerken_notitie') || null,
    blad_materiaal: chipVal('materiaal_blad'),
    blad_dikte: parseInt(v('f_blad_dikte')) || null,
    blad_kleur: v('f_blad_kleur') || null,
    achterwand: isOn('tgl_achterwand'),
    spatrand: isOn('tgl_spatrand'),
    blad_notitie: v('f_blad_notitie') || null,
    spoelbak_kleur: v('f_spoelbak_kleur') || null,
    spoelbak_materiaal: chipVal('spoelbak_materiaal'),
    spoelbak_montage: chipVal('spoelbak_montage'),
    spoelbak_config: chipVal('spoelbak_config'),
    spoelbak_notitie: v('f_spoelbak_notitie') || null,
    kraan_montage: chipVal('kraan_montage'),
    kraan_kleur: v('f_kraan_kleur') || null,
    kraan_kokend: isOn('tgl_kokend'),
    kraan_uitrek: isOn('tgl_uitrek'),
    kraan_greep: chipVal('kraan_greep'),
    kraan_notitie: v('f_kraan_notitie') || null,
    kasten_onder: parseInt(v('f_kasten_onder')) || null,
    kasten_boven: parseInt(v('f_kasten_boven')) || null,
    kasten_hoog: parseInt(v('f_kasten_hoog')) || null,
    kasten_hoogte: parseInt(v('f_kasten_hoogte')) || null,
    kasten_greep: chipVal('kasten_greep'),
    kasten_verlichting: isOn('tgl_verlichting'),
    kasten_softclose: isOn('tgl_softclose'),
    kasten_notitie: v('f_kasten_notitie') || null,
    locatie_etage: chipVal('locatie_etage'),
    locatie_toegang: chipVal('locatie_toegang'),
  };

  // Auto-samenvatting — gebruik textarea-waarde (eventueel handmatig aangepast)
  details.auto_summary = isOn('tgl_summary') ? (v('summary-text') || null) : null;

  const sb = document.getElementById('sb');
  sb.disabled = true;
  sb.innerHTML = `<div class="spin" style="width:18px;height:18px;border-width:2px"></div> Bezig…`;
  fa.innerHTML = '';

  try {
    await db.from('profiles').upsert({
      id: user.id,
      name: profile?.name || user.email?.split('@')[0] || '',
      role: profile?.role || 'aanbieder'
    }, { onConflict: 'id' });

    const { data: listing, error: le } = await db.from('listings').insert({
      user_id: user.id, title, price, city,
      brand: merk || null,
      color: kleur || null,
      height_cm: details.kasten_hoogte,
      afmetingen: JSON.stringify(details),
      description: v('f_desc') || null,
      keuken_type: chipVal('keuken_type'),
      conditie: chipVal('conditie'),
      materiaal_blad: chipVal('materiaal_blad'),
      leeftijd_jaar: parseInt(v('f_age')) || null,
      apparatuur: pendingApparatuur.length ? JSON.stringify(pendingApparatuur) : null,
      demontage: chipVal('demontage'),
      ophalen_bezorgen: chipVal('ophalen_bezorgen'),
      incl_bovenkasten: false,
      incl_spoelbak: false,
    }).select().single();
    if (le) throw le;

    // Hoofdfoto's uploaden
    for (let i = 0; i < pendingPhotos.length; i++) {
      const { file } = pendingPhotos[i];
      const ext = file.name.split('.').pop();
      const path = `${listing.id}/${i}-${Date.now()}.${ext}`;
      const { error: ue } = await db.storage.from('photos').upload(path, file, { cacheControl: '3600' });
      if (ue) throw ue;
      const { data: { publicUrl } } = db.storage.from('photos').getPublicUrl(path);
      await db.from('listing_photos').insert({ listing_id: listing.id, url: publicUrl, order_index: i, foto_type: 'foto' });
    }

    // Sectie-foto's uploaden
    for (const [section, photos] of Object.entries(pendingSectionPhotos)) {
      for (let i = 0; i < photos.length; i++) {
        const { file } = photos[i];
        const ext = file.name.split('.').pop();
        const path = `${listing.id}/sec-${section}-${i}-${Date.now()}.${ext}`;
        const { error: ue } = await db.storage.from('photos').upload(path, file, { cacheControl: '3600' });
        if (ue) throw ue;
        const { data: { publicUrl } } = db.storage.from('photos').getPublicUrl(path);
        await db.from('listing_photos').insert({ listing_id: listing.id, url: publicUrl, order_index: 200 + i, foto_type: section });
      }
    }

    // Tekeningen uploaden
    for (let i = 0; i < pendingTekeningen.length; i++) {
      const { file } = pendingTekeningen[i];
      const ext = file.name.split('.').pop();
      const path = `${listing.id}/tek-${i}-${Date.now()}.${ext}`;
      const { error: ue } = await db.storage.from('photos').upload(path, file, { cacheControl: '3600' });
      if (ue) throw ue;
      const { data: { publicUrl } } = db.storage.from('photos').getPublicUrl(path);
      await db.from('listing_photos').insert({ listing_id: listing.id, url: publicUrl, order_index: 100 + i, foto_type: 'tekening' });
    }

    go(`k/${listing.id}`);
  } catch (e) {
    fa.innerHTML = err(e.message);
    fa.scrollIntoView({ behavior: 'smooth', block: 'center' });
    sb.disabled = false;
    sb.innerHTML = 'Advertentie plaatsen →';
  }
};

// ── BEWERKEN ──────────────────────────────────────────────
async function pageBewerken(el, id) {
  if (!user) { go('login'); return; }
  el.innerHTML = `<div class="spin-wrap"><div class="spin"></div></div>`;

  const { data: listing, error } = await db
    .from('listings')
    .select('*, listing_photos(url, order_index, foto_type)')
    .eq('id', id)
    .single();

  if (error || !listing || listing.user_id !== user.id) {
    el.innerHTML = `<div class="page-narrow"><div class="card" style="padding:40px;text-align:center">
      <div style="font-size:42px;margin-bottom:12px">🔍</div>
      <div style="font-size:17px;font-weight:700;margin-bottom:8px">Advertentie niet gevonden</div>
      <button class="btn btn-primary" onclick="go('mijn')">Mijn advertenties</button>
    </div></div>`;
    return;
  }

  editListingId = id;

  // Reset pending arrays, then render the form
  pendingPhotos = [];
  pendingTekeningen = [];
  pendingApparatuur = [];
  await pageAanbieden(el);

  // ── Wijzig titel + knoptekst ──
  const h1 = el.querySelector('h1');
  if (h1) h1.textContent = 'Advertentie aanpassen';
  const subLine = h1?.nextElementSibling;
  if (subLine) subLine.textContent = 'Pas je advertentie aan en sla de wijzigingen op.';
  const sb = document.getElementById('sb');
  if (sb) { sb.textContent = 'Wijzigingen opslaan →'; sb.onclick = window.updateListing; }

  // ── Basisvelden ──
  const setVal = (id, val) => { const el = document.getElementById(id); if (el && val !== null && val !== undefined) el.value = val; };
  setVal('f_merk',  listing.brand || '');
  setVal('f_kleur', listing.color || '');
  setVal('f_p',     listing.price);
  setVal('f_city',  listing.city);
  setVal('f_age',   listing.leeftijd_jaar || '');
  setVal('f_desc',  listing.description || '');
  window.updateAutoTitle?.();

  // ── Chips helper ──
  const selChipVal = (group, val) => {
    if (!val) return;
    const chip = Array.from(document.querySelectorAll(`.chip[data-group="${group}"]`)).find(c => c.getAttribute('data-val') === val);
    if (chip) chip.classList.add('sel');
  };
  selChipVal('keuken_type',     listing.keuken_type);
  selChipVal('conditie',        listing.conditie);
  selChipVal('materiaal_blad',  listing.materiaal_blad);
  selChipVal('ophalen_bezorgen',listing.ophalen_bezorgen);
  selChipVal('demontage',       listing.demontage);

  // ── Details JSON (nieuw formaat + backward compat oud formaat) ──
  if (listing.afmetingen) {
    const d = typeof listing.afmetingen === 'string' ? JSON.parse(listing.afmetingen) : listing.afmetingen;
    // Nieuw formaat
    setVal('f_type',             d.type_model || '');
    setVal('f_buitenmaten',      d.buitenmaten || '');
    setVal('f_kenmerken_notitie',d.kenmerken_notitie || '');
    setVal('f_blad_dikte',       d.blad_dikte || '');
    setVal('f_blad_kleur',       d.blad_kleur || '');
    setVal('f_blad_notitie',     d.blad_notitie || '');
    setVal('f_spoelbak_kleur',   d.spoelbak_kleur || '');
    setVal('f_spoelbak_notitie', d.spoelbak_notitie || '');
    setVal('f_kraan_kleur',      d.kraan_kleur || '');
    setVal('f_kraan_notitie',    d.kraan_notitie || '');
    setVal('f_kasten_onder',     d.kasten_onder || '');
    setVal('f_kasten_boven',     d.kasten_boven || '');
    setVal('f_kasten_hoog',      d.kasten_hoog || '');
    setVal('f_kasten_hoogte',    d.kasten_hoogte || '');
    setVal('f_kasten_notitie',   d.kasten_notitie || '');
    selChipVal('keuken_type',        d.vorm || listing.keuken_type);
    selChipVal('materiaal_blad',     d.blad_materiaal || listing.materiaal_blad);
    selChipVal('spoelbak_materiaal', d.spoelbak_materiaal);
    selChipVal('spoelbak_montage',   d.spoelbak_montage);
    selChipVal('spoelbak_config',    d.spoelbak_config);
    selChipVal('kraan_montage',      d.kraan_montage);
    selChipVal('kraan_greep',        d.kraan_greep);
    selChipVal('kasten_greep',       d.kasten_greep);
    selChipVal('locatie_etage',      d.locatie_etage);
    selChipVal('locatie_toegang',    d.locatie_toegang);
    if (d.achterwand)        document.getElementById('tgl_achterwand')?.classList.add('on');
    if (d.spatrand)          document.getElementById('tgl_spatrand')?.classList.add('on');
    if (d.kraan_kokend)      document.getElementById('tgl_kokend')?.classList.add('on');
    if (d.kraan_uitrek)      document.getElementById('tgl_uitrek')?.classList.add('on');
    if (d.kasten_verlichting)document.getElementById('tgl_verlichting')?.classList.add('on');
    if (d.kasten_softclose)  document.getElementById('tgl_softclose')?.classList.add('on');
    // Samenvatting: pre-fill textarea en zet toggle aan als er al een opgeslagen tekst is
    if (d.auto_summary) {
      document.getElementById('tgl_summary')?.classList.add('on');
      const ta = document.getElementById('summary-text');
      if (ta) { ta.value = d.auto_summary; window._summaryEdited = true; }
    } else {
      window._summaryEdited = false;
      window.updateAutoSummary?.();
    }
  }

  // ── Apparatuur ──
  if (listing.apparatuur) {
    pendingApparatuur = typeof listing.apparatuur === 'string' ? JSON.parse(listing.apparatuur) : (listing.apparatuur || []);
    renderApparaatList();
  }

  // ── Bestaande foto's (hoofd) ──
  const sortedPhotos = sort(listing.listing_photos || []);
  sortedPhotos.filter(p => p.foto_type === 'foto').forEach(p => {
    pendingPhotos.push({ url: p.url, existing: true });
  });
  document.getElementById('pg').innerHTML = photoGridHTML();

  // ── Bestaande sectie-foto's ──
  SECTION_KEYS.forEach(section => {
    sortedPhotos.filter(p => p.foto_type === section).forEach(p => {
      if (pendingSectionPhotos[section]) {
        pendingSectionPhotos[section].push({ url: p.url, existing: true });
      }
    });
    renderSectionPhotoRow(section);
  });

  // ── Bestaande tekeningen ──
  sortedPhotos.filter(p => p.foto_type === 'tekening').forEach(p => {
    pendingTekeningen.push({ existing: true, name: decodeURIComponent(p.url.split('/').pop()), url: p.url });
  });
  renderTekenList();
}

window.updateListing = async () => {
  const merk = v('f_merk'), typeModel = v('f_type'), kleur = v('f_kleur');
  const title = [merk, typeModel, kleur].filter(Boolean).join(' ') || 'Keuken';
  const price = parseInt(v('f_p')), city = v('f_city');
  const fa = document.getElementById('fa');
  if (!price || !city) {
    fa.innerHTML = err('Vul minimaal een prijs en stad in.');
    fa.scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }

  const chipVal = group =>
    document.querySelector(`.chip[data-group="${group}"].sel`)?.getAttribute('data-val') || null;
  const isOn = id => document.getElementById(id)?.classList.contains('on') || false;

  const details = {
    type_model: typeModel || null, vorm: chipVal('keuken_type'),
    buitenmaten: v('f_buitenmaten') || null, kenmerken_notitie: v('f_kenmerken_notitie') || null,
    blad_materiaal: chipVal('materiaal_blad'), blad_dikte: parseInt(v('f_blad_dikte')) || null,
    blad_kleur: v('f_blad_kleur') || null, achterwand: isOn('tgl_achterwand'), spatrand: isOn('tgl_spatrand'),
    blad_notitie: v('f_blad_notitie') || null, spoelbak_kleur: v('f_spoelbak_kleur') || null,
    spoelbak_materiaal: chipVal('spoelbak_materiaal'), spoelbak_montage: chipVal('spoelbak_montage'),
    spoelbak_config: chipVal('spoelbak_config'), spoelbak_notitie: v('f_spoelbak_notitie') || null,
    kraan_montage: chipVal('kraan_montage'), kraan_kleur: v('f_kraan_kleur') || null,
    kraan_kokend: isOn('tgl_kokend'), kraan_uitrek: isOn('tgl_uitrek'), kraan_greep: chipVal('kraan_greep'),
    kraan_notitie: v('f_kraan_notitie') || null, kasten_onder: parseInt(v('f_kasten_onder')) || null,
    kasten_boven: parseInt(v('f_kasten_boven')) || null, kasten_hoog: parseInt(v('f_kasten_hoog')) || null,
    kasten_hoogte: parseInt(v('f_kasten_hoogte')) || null, kasten_greep: chipVal('kasten_greep'),
    kasten_verlichting: isOn('tgl_verlichting'), kasten_softclose: isOn('tgl_softclose'),
    kasten_notitie: v('f_kasten_notitie') || null,
    locatie_etage: chipVal('locatie_etage'), locatie_toegang: chipVal('locatie_toegang'),
  };

  // Auto-samenvatting — gebruik textarea-waarde (eventueel handmatig aangepast)
  details.auto_summary = isOn('tgl_summary') ? (v('summary-text') || null) : null;

  const sb = document.getElementById('sb');
  sb.disabled = true;
  sb.innerHTML = `<div class="spin" style="width:18px;height:18px;border-width:2px"></div> Bezig…`;
  fa.innerHTML = '';
  const listingId = editListingId;

  try {
    const { error: le } = await db.from('listings').update({
      title, price, city,
      brand: merk || null, color: kleur || null,
      height_cm: details.kasten_hoogte,
      afmetingen: JSON.stringify(details),
      description: v('f_desc') || null,
      keuken_type: chipVal('keuken_type'), conditie: chipVal('conditie'),
      materiaal_blad: chipVal('materiaal_blad'), leeftijd_jaar: parseInt(v('f_age')) || null,
      apparatuur: pendingApparatuur.length ? JSON.stringify(pendingApparatuur) : null,
      demontage: chipVal('demontage'), ophalen_bezorgen: chipVal('ophalen_bezorgen'),
      incl_bovenkasten: false, incl_spoelbak: false,
    }).eq('id', listingId);
    if (le) throw le;

    // Nieuwe hoofdfoto's
    const existingPhotoCount = pendingPhotos.filter(p => p.existing).length;
    const newPhotos = pendingPhotos.filter(p => !p.existing);
    for (let i = 0; i < newPhotos.length; i++) {
      const { file } = newPhotos[i]; const ext = file.name.split('.').pop();
      const path = `${listingId}/${existingPhotoCount + i}-${Date.now()}.${ext}`;
      const { error: ue } = await db.storage.from('photos').upload(path, file, { cacheControl: '3600' });
      if (ue) throw ue;
      const { data: { publicUrl } } = db.storage.from('photos').getPublicUrl(path);
      await db.from('listing_photos').insert({ listing_id: listingId, url: publicUrl, order_index: existingPhotoCount + i, foto_type: 'foto' });
    }

    // Nieuwe sectie-foto's
    for (const [section, photos] of Object.entries(pendingSectionPhotos)) {
      const newSec = photos.filter(p => !p.existing);
      const existCount = photos.filter(p => p.existing).length;
      for (let i = 0; i < newSec.length; i++) {
        const { file } = newSec[i]; const ext = file.name.split('.').pop();
        const path = `${listingId}/sec-${section}-${existCount + i}-${Date.now()}.${ext}`;
        const { error: ue } = await db.storage.from('photos').upload(path, file, { cacheControl: '3600' });
        if (ue) throw ue;
        const { data: { publicUrl } } = db.storage.from('photos').getPublicUrl(path);
        await db.from('listing_photos').insert({ listing_id: listingId, url: publicUrl, order_index: 200 + existCount + i, foto_type: section });
      }
    }

    // Nieuwe tekeningen
    const existingTekenCount = pendingTekeningen.filter(t => t.existing).length;
    const newTekeningen = pendingTekeningen.filter(t => !t.existing);
    for (let i = 0; i < newTekeningen.length; i++) {
      const { file } = newTekeningen[i]; const ext = file.name.split('.').pop();
      const path = `${listingId}/tek-${existingTekenCount + i}-${Date.now()}.${ext}`;
      const { error: ue } = await db.storage.from('photos').upload(path, file, { cacheControl: '3600' });
      if (ue) throw ue;
      const { data: { publicUrl } } = db.storage.from('photos').getPublicUrl(path);
      await db.from('listing_photos').insert({ listing_id: listingId, url: publicUrl, order_index: 100 + existingTekenCount + i, foto_type: 'tekening' });
    }

    editListingId = null;
    go(`k/${listingId}`);
  } catch (e) {
    fa.innerHTML = err(e.message);
    fa.scrollIntoView({ behavior: 'smooth', block: 'center' });
    sb.disabled = false;
    sb.innerHTML = 'Wijzigingen opslaan →';
  }
};

// ── LOGIN / REGISTER ──────────────────────────────────────
async function pageLogin(el) {
  if (user) { go(''); return; }
  let tab = 'login';

  const draw = () => {
    el.innerHTML = `<div class="page-narrow"><div class="card">
      <div class="tabs">
        <div class="tab${tab==='login'?' active':''}" onclick="setTab('login')">Inloggen</div>
        <div class="tab${tab==='register'?' active':''}" onclick="setTab('register')">Registreren</div>
      </div>
      <div id="aa"></div>
      ${tab==='register' ? `<div class="fg"><label class="fl">Naam</label><input id="a_n" class="fi" placeholder="Jouw naam"></div>` : ''}
      <div class="fg"><label class="fl">E-mailadres</label><input id="a_e" class="fi" type="email" placeholder="jij@email.nl"></div>
      <div class="fg"><label class="fl">Wachtwoord</label><input id="a_p" class="fi" type="password" placeholder="${tab==='register'?'Minimaal 8 tekens':''}"></div>
      ${tab==='register' ? `<div class="fg"><label class="fl">Ik ben een…</label>
        <div class="role-grid">
          <div class="role-opt sel" data-r="koper" onclick="selRole(this)"><div class="ri">🛍️</div><div class="rl">Koper</div></div>
          <div class="role-opt" data-r="aanbieder" onclick="selRole(this)"><div class="ri">🏠</div><div class="rl">Aanbieder</div></div>
          <div class="role-opt" data-r="monteur" onclick="selRole(this)"><div class="ri">🔧</div><div class="rl">Monteur</div></div>
        </div>
      </div>
      <div id="rol-intro"></div>` : ''}
      <button class="submit-btn" id="ab" onclick="doAuth('${tab}')">
        ${tab==='login' ? 'Inloggen' : 'Account aanmaken'}
      </button>
    </div></div>`;
  };

  window.setTab = t => { tab = t; draw(); };
  const ROL_INTRO = {
    koper: ``,
    aanbieder: ``,
    monteur: ``,
  };

  window.selRole = el => {
    document.querySelectorAll('.role-opt').forEach(r => r.classList.remove('sel'));
    el.classList.add('sel');
    const intro = document.getElementById('rol-intro');
    if (intro) intro.innerHTML = ROL_INTRO[el.dataset.r] || '';
  };
  window.doAuth = async mode => {
    const email = v('a_e'), pw = v('a_p'), aa = document.getElementById('aa');
    if (!email || !pw) { aa.innerHTML = err('Vul alle velden in.'); return; }
    const ab = document.getElementById('ab');
    ab.disabled = true; aa.innerHTML = '';
    try {
      if (mode === 'login') {
        const { error: e } = await db.auth.signInWithPassword({ email, password: pw });
        if (e) throw e;
        go('');
      } else {
        const name = v('a_n') || '';
        const role = document.querySelector('.role-opt.sel')?.dataset?.r || 'koper';
        const { data, error: e } = await db.auth.signUp({ email, password: pw, options: { data: { name } } });
        if (e) throw e;
        if (data.user) {
          await db.from('profiles').upsert({ id: data.user.id, name, role });
          go('');
        } else {
          aa.innerHTML = `<div class="alert alert-ok">✅ Bevestig je account via de e-mail die we je gestuurd hebben, dan kun je inloggen.</div>`;
          tab = 'login'; draw();
        }
      }
    } catch (e) { aa.innerHTML = err(e.message); ab.disabled = false; }
  };

  draw();
}

window.saveProfile = async () => {
  const phone = document.getElementById('p_phone')?.value?.trim() || null;
  const contact_email = document.getElementById('p_email')?.value?.trim() || null;
  const regio = document.getElementById('p_regio')?.value?.trim() || null;
  const richtprijs = parseInt(document.getElementById('p_richtprijs')?.value) || null;
  const bio = document.getElementById('p_bio')?.value?.trim() || null;
  const al = document.getElementById('profile-alert');
  const updates = { phone, contact_email, regio, richtprijs, bio };
  const { error } = await db.from('profiles').update(updates).eq('id', user.id);
  if (error) { al.innerHTML = `<div class="alert alert-err">⚠️ ${error.message}</div>`; return; }
  profile = { ...profile, ...updates };
  al.innerHTML = `<div class="alert alert-ok">✅ Opgeslagen!</div>`;
  setTimeout(() => { al.innerHTML = ''; }, 3000);
};

window.uitloggen = async () => {
  await db.auth.signOut();
  user = null; profile = null;
  go('');
};
window.delListing = async id => {
  if (!confirm('Weet je zeker dat je deze advertentie wilt verwijderen?')) return;
  await db.from('listings').delete().eq('id', id);
  go('mijn');
};

let activeListing = null;
window.openOfferte = (listingId, huidigePrijs) => {
  activeListing = listingId;
  document.getElementById('om_prijs').value = huidigePrijs || '';
  document.getElementById('om_vb').value = '';
  document.getElementById('om-alert').innerHTML = '';
  const modal = document.getElementById('offerteModal');
  modal.style.display = 'flex';
};
window.closeOfferte = () => {
  document.getElementById('offerteModal').style.display = 'none';
  activeListing = null;
};
window.submitOfferte = async () => {
  const prijs = parseInt(document.getElementById('om_prijs').value);
  const voorbehouden = document.getElementById('om_vb').value.trim() || null;
  const al = document.getElementById('om-alert');
  if (!prijs || prijs < 1) { al.innerHTML = err('Vul een geldige prijs in.'); return; }

  const { error } = await db.from('offertes').upsert({
    listing_id: activeListing,
    monteur_id: user.id,
    prijs,
    voorbehouden
  }, { onConflict: 'listing_id,monteur_id' });

  if (error) { al.innerHTML = err(error.message); return; }
  closeOfferte();
  pageMonteur(document.querySelector('main'));
};

// ── STRIPE BETAALFLOW ─────────────────────────────────────
window.startCheckout = async (monteurId) => {
  if (!user) { go('login'); return; }
  const btn = document.getElementById('checkout-btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = `<div class="spin" style="width:16px;height:16px;border-width:2px"></div> Laden…`;
  }
  try {
    const res = await fetch(`${SB_URL}/functions/v1/create-checkout`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SB_KEY}`,
        'apikey': SB_KEY,
      },
      body: JSON.stringify({
        monteur_id: monteurId,
        buyer_id: user.id,
        origin: window.location.origin,
      }),
    });
    const { url, session_id, error } = await res.json();
    if (error) throw new Error(error);
    // Sla session_id op voor verificatie na terugkeer
    sessionStorage.setItem('kk_pending', JSON.stringify({ session_id, monteur_id: monteurId }));
    window.location.href = url;
  } catch (e) {
    alert('Er ging iets mis: ' + e.message);
    if (btn) { btn.disabled = false; btn.innerHTML = '🔓 Ontgrendel contact — €9,95'; }
  }
};

async function verifyPayment(sessionId, monteurId, buyerId) {
  try {
    await fetch(`${SB_URL}/functions/v1/verify-payment`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${SB_KEY}`,
        'apikey': SB_KEY,
      },
      body: JSON.stringify({
        session_id: sessionId,
        monteur_id: monteurId,
        buyer_id: buyerId,
      }),
    });
  } catch (e) {
    console.error('Betaling verifiëren mislukt:', e);
  }
}

// ── KEUKEN MAATDIAGRAM ────────────────────────────────────

function _svgDefs() {
  return `<defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,1 L6,3.5 L0,6 Z" fill="#888"/>
    </marker>
    <marker id="arrl" markerWidth="7" markerHeight="7" refX="1" refY="3.5" orient="auto-start-reverse">
      <path d="M0,1 L6,3.5 L0,6 Z" fill="#888"/>
    </marker>
  </defs>`;
}

// Horizontale maatpijl
function _hd(x1, x2, y, val) {
  const mx = (x1 + x2) / 2, lbl = val ? val + ' cm' : '?';
  return `<line x1="${x1}" y1="${y}" x2="${x2}" y2="${y}" stroke="#999" stroke-width="1" marker-start="url(#arrl)" marker-end="url(#arr)"/>
    <rect x="${mx - 19}" y="${y + 2}" width="38" height="13" fill="white"/>
    <text x="${mx}" y="${y + 12}" text-anchor="middle" font-size="10" fill="#444" font-family="-apple-system,sans-serif" font-weight="600">${lbl}</text>`;
}

// Verticale maatpijl
function _vd(y1, y2, x, val) {
  const my = (y1 + y2) / 2, lbl = val ? val + ' cm' : '?';
  return `<line x1="${x}" y1="${y1}" x2="${x}" y2="${y2}" stroke="#999" stroke-width="1" marker-start="url(#arrl)" marker-end="url(#arr)"/>
    <rect x="${x + 3}" y="${my - 7}" width="38" height="13" fill="white"/>
    <text x="${x + 7}" y="${my + 4}" font-size="10" fill="#444" font-family="-apple-system,sans-serif" font-weight="600">${lbl}</text>`;
}

// Hulplijnen
function _eh(x, ya, yb) { return `<line x1="${x}" y1="${ya}" x2="${x}" y2="${yb}" stroke="#CCC" stroke-width="0.8" stroke-dasharray="3,2"/>`; }
function _ev(y, xa, xb) { return `<line x1="${xa}" y1="${y}" x2="${xb}" y2="${y}" stroke="#CCC" stroke-width="0.8" stroke-dasharray="3,2"/>`; }

const _cab = `fill="#EEF0E8" stroke="#444" stroke-width="2"`;

function _getDims() {
  const ids = ['f_w','f_d','f_h','f_wand1','f_wand2','f_wl','f_wr','f_wa','f_eibr','f_eid','f_gang'];
  const d = {};
  ids.forEach(id => { const el = document.getElementById(id); d[id] = el ? el.value.trim() : ''; });
  return d;
}

// Invoervelden per type
const DIAG_FIELDS = {
  'Rechte keuken': [{id:'f_w', lbl:'Breedte', ph:'300', hint:'totale lengte'}],
  'Hoek':          [{id:'f_wand1', lbl:'Wand 1 (lang)', ph:'360', hint:'langste wand'}, {id:'f_wand2', lbl:'Wand 2 (kort)', ph:'240'}],
  'U-vorm':        [{id:'f_wa', lbl:'Wand achter', ph:'300'}, {id:'f_wl', lbl:'Wand links', ph:'220'}, {id:'f_wr', lbl:'Wand rechts', ph:'220'}],
  'Eiland':        [{id:'f_w', lbl:'Breedte keuken', ph:'300'}, {id:'f_eibr', lbl:'Breedte eiland', ph:'150'}, {id:'f_eid', lbl:'Diepte eiland', ph:'90'}, {id:'f_gang', lbl:'Gangpad', ph:'120', hint:'ruimte keuken–eiland'}],
  'Galley':        [{id:'f_w', lbl:'Breedte', ph:'300'}, {id:'f_eid', lbl:'Diepte rij 2', ph:'60'}, {id:'f_gang', lbl:'Gangpad', ph:'120', hint:'ruimte tussen de rijen'}],
  'Overig':        [{id:'f_w', lbl:'Breedte', ph:'300'}],
};

// Wandlijn (muur) en aanrechtlijn helpers
function _wl(x1,y1,x2,y2){return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#444" stroke-width="3" stroke-linecap="square"/>`;}
function _ct(x1,y1,x2,y2){return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#C8A070" stroke-width="3" stroke-linecap="square"/>`;}

// Plattegrond SVG per keukentype (van bovenaf) — vorm + buitenmaten
function keukenSVG(type, dims) {
  const n = id => parseInt(dims[id]) || 0;
  const M = 44, MW = 226, MH = 164, ov = 2;
  const ZF = '#EEF0E8'; // zone fill

  switch (type) {
    case 'Rechte keuken': {
      const W=n('f_w')||300, D=n('f_d')||60, s=Math.min(MW/W,MH/D), w=W*s, d=D*s;
      const VW=M+w+50, VH=M+d+42;
      return `<svg viewBox="0 0 ${VW} ${VH}" style="width:100%;max-height:200px" xmlns="http://www.w3.org/2000/svg">${_svgDefs()}
        ${_wl(M,M,M+w,M)}
        <rect x="${M}" y="${M}" width="${w}" height="${d}" fill="${ZF}" stroke="none"/>
        ${_ct(M,M+d+ov,M+w,M+d+ov)}
        ${_eh(M,M,M+d+16)} ${_eh(M+w,M,M+d+16)} ${_hd(M,M+w,M+d+13,n('f_w'))}
        ${_ev(M,M+w+10,M+w+38)} ${_ev(M+d,M+w+10,M+w+38)} ${_vd(M,M+d,M+w+25,n('f_d'))}
      </svg>`;
    }
    case 'Hoek': {
      const W1=n('f_wand1')||360, W2=n('f_wand2')||240, D=n('f_d')||60;
      const s=Math.min(MW/W1,MH/W2), w1=W1*s, w2=W2*s, d=Math.min(D*s, w1-1, w2-1);
      const VW=M+w1+50, VH=M+w2+40;
      return `<svg viewBox="0 0 ${VW} ${VH}" style="width:100%;max-height:260px" xmlns="http://www.w3.org/2000/svg">${_svgDefs()}
        ${_wl(M,M,M,M+w2)}
        ${_wl(M,M+w2,M+w1,M+w2)}
        <polygon points="${M},${M} ${M+d},${M} ${M+d},${M+w2-d} ${M+w1},${M+w2-d} ${M+w1},${M+w2} ${M},${M+w2}" fill="${ZF}" stroke="none"/>
        ${_ct(M+d+ov,M,M+d+ov,M+w2-d)}
        ${_ct(M,M+w2-d-ov,M+w1,M+w2-d-ov)}
        ${_eh(M,M+w2,VH-10)} ${_eh(M+w1,M+w2,VH-10)} ${_hd(M,M+w1,VH-12,n('f_wand1'))}
        ${_ev(M,Math.max(1,M-22),M-1)} ${_ev(M+w2,Math.max(1,M-22),M-1)} ${_vd(M,M+w2,Math.max(1,M-24),n('f_wand2'))}
      </svg>`;
    }
    case 'U-vorm': {
      const WA=n('f_wa')||300, WL=n('f_wl')||220, WR=n('f_wr')||220, D=n('f_d')||60;
      const s=Math.min(MW/WA,MH/Math.max(WL,WR)), wa=WA*s, wl=WL*s, wr=WR*s, d=Math.min(D*s, wa/2-1, wl-1, wr-1);
      const VW=M+wa+50, VH=M+Math.max(wl,wr)+34;
      return `<svg viewBox="0 0 ${VW} ${VH}" style="width:100%;max-height:280px" xmlns="http://www.w3.org/2000/svg">${_svgDefs()}
        ${_wl(M,M,M+wa,M)}
        ${_wl(M,M,M,M+wl)}
        ${_wl(M+wa,M,M+wa,M+wr)}
        <polygon points="${M},${M} ${M+wa},${M} ${M+wa},${M+wr} ${M+wa-d},${M+wr} ${M+wa-d},${M+d} ${M+d},${M+d} ${M+d},${M+wl} ${M},${M+wl}" fill="${ZF}" stroke="none"/>
        ${_ct(M,M+d+ov,M+wa,M+d+ov)}
        ${_ct(M+d+ov,M+d,M+d+ov,M+wl)}
        ${_ct(M+wa-d-ov,M+d,M+wa-d-ov,M+wr)}
        ${_eh(M,M,Math.max(1,M-22))} ${_eh(M+wa,M,Math.max(1,M-22))} ${_hd(M,M+wa,Math.max(4,M-25),n('f_wa'))}
        ${_ev(M,Math.max(1,M-22),M-1)} ${_ev(M+wl,Math.max(1,M-22),M-1)} ${_vd(M,M+wl,Math.max(1,M-24),n('f_wl'))}
        ${_ev(M,M+wa+10,M+wa+36)} ${_ev(M+wr,M+wa+10,M+wa+36)} ${_vd(M,M+wr,M+wa+24,n('f_wr'))}
      </svg>`;
    }
    case 'Eiland': {
      const W=n('f_w')||300, D=n('f_d')||60, EBR=n('f_eibr')||150, ED=n('f_eid')||90, GANG=n('f_gang')||120;
      const totH=D+GANG+ED, s=Math.min(MW/W,MH/totH), w=W*s, d=D*s, ebr=EBR*s, ed=ED*s, gang=GANG*s;
      const VW=M+w+24, VH=M+totH*s+38, ex=M+(w-ebr)/2;
      return `<svg viewBox="0 0 ${VW} ${VH}" style="width:100%;max-height:280px" xmlns="http://www.w3.org/2000/svg">${_svgDefs()}
        ${_wl(M,M,M+w,M)}
        <rect x="${M}" y="${M}" width="${w}" height="${d}" fill="${ZF}" stroke="none"/>
        ${_ct(M,M+d+ov,M+w,M+d+ov)}
        <rect x="${ex}" y="${M+d+gang}" width="${ebr}" height="${ed}" fill="${ZF}" stroke="#AAA" stroke-width="0.5" stroke-dasharray="4,2" rx="1"/>
        ${_ct(ex,M+d+gang-ov,ex+ebr,M+d+gang-ov)}
        ${_ct(ex,M+d+gang+ed+ov,ex+ebr,M+d+gang+ed+ov)}
        ${_eh(M,M+totH*s,VH-10)} ${_eh(M+w,M+totH*s,VH-10)} ${_hd(M,M+w,VH-12,n('f_w'))}
        <line x1="${M+w+8}" y1="${M+d}" x2="${M+w+8}" y2="${M+d+gang}" stroke="#CCC" stroke-width="0.8" stroke-dasharray="3,2"/>
        <rect x="${M+w+11}" y="${M+d+gang/2-6}" width="28" height="12" fill="white"/>
        <text x="${M+w+13}" y="${M+d+gang/2+3}" font-size="9" fill="#888" font-family="sans-serif" font-weight="600">${n('f_gang')?n('f_gang')+'cm':'?'}</text>
      </svg>`;
    }
    case 'Galley': {
      const W=n('f_w')||300, D1=n('f_d')||60, D2=n('f_eid')||60, GANG=n('f_gang')||120;
      const totH=D1+GANG+D2, s=Math.min(MW/W,MH/totH), w=W*s, d1=D1*s, d2=D2*s, gang=GANG*s;
      const VW=M+w+50, VH=M+totH*s+36;
      return `<svg viewBox="0 0 ${VW} ${VH}" style="width:100%;max-height:280px" xmlns="http://www.w3.org/2000/svg">${_svgDefs()}
        ${_wl(M,M,M+w,M)}
        <rect x="${M}" y="${M}" width="${w}" height="${d1}" fill="${ZF}" stroke="none"/>
        ${_ct(M,M+d1+ov,M+w,M+d1+ov)}
        ${_wl(M,M+d1+gang+d2,M+w,M+d1+gang+d2)}
        <rect x="${M}" y="${M+d1+gang}" width="${w}" height="${d2}" fill="${ZF}" stroke="none"/>
        ${_ct(M,M+d1+gang-ov,M+w,M+d1+gang-ov)}
        ${_eh(M,M,VH-10)} ${_eh(M+w,M,VH-10)} ${_hd(M,M+w,VH-12,n('f_w'))}
        ${_ev(M+d1,M+w+10,M+w+36)} ${_ev(M+d1+gang,M+w+10,M+w+36)} ${_vd(M+d1,M+d1+gang,M+w+24,n('f_gang'))}
      </svg>`;
    }
    default: {
      const W=n('f_w')||300, D=n('f_d')||60, s=Math.min(MW/W,MH/D), w=W*s, d=D*s;
      const VW=M+w+50, VH=M+d+42;
      return `<svg viewBox="0 0 ${VW} ${VH}" style="width:100%;max-height:200px" xmlns="http://www.w3.org/2000/svg">${_svgDefs()}
        ${_wl(M,M,M+w,M)}
        <rect x="${M}" y="${M}" width="${w}" height="${d}" fill="${ZF}" stroke="none"/>
        ${_ct(M,M+d+ov,M+w,M+d+ov)}
        ${_eh(M,M,M+d+16)} ${_eh(M+w,M,M+d+16)} ${_hd(M,M+w,M+d+13,n('f_w'))}
        ${_ev(M,M+w+10,M+w+38)} ${_ev(M+d,M+w+10,M+w+38)} ${_vd(M,M+d,M+w+25,n('f_d'))}
      </svg>`;
    }
  }
}

function renderAfmetingen(type) {
  const wrap = document.getElementById('afm-wrap');
  if (!wrap) return;
  const fields = DIAG_FIELDS[type] || DIAG_FIELDS['Rechte keuken'];
  const d = _getDims();

  wrap.innerHTML = `
    <div style="background:#FAFAF8;border:1px solid var(--gray-2);border-radius:var(--r-sm);padding:8px 8px 4px;margin-bottom:14px;overflow:hidden">
      <div id="afm-svg">${keukenSVG(type, d)}</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(${fields.length > 3 ? 3 : Math.min(fields.length,2)},1fr);gap:10px 14px;margin-bottom:18px">
      ${fields.map(f => `
        <div class="fg" style="margin-bottom:0">
          <label class="fl">${f.lbl} (cm)</label>
          <input id="${f.id}" class="fi" type="number" placeholder="${f.ph}" min="0" oninput="updateDiagram('${type}')">
          ${f.hint ? `<div style="font-size:11px;color:var(--gray-4);margin-top:3px">${f.hint}</div>` : ''}
        </div>`).join('')}
    </div>`;

  // Bestaande waarden herstellen
  fields.forEach(f => { const el = document.getElementById(f.id); if (el && d[f.id]) el.value = d[f.id]; });
  const svgEl = document.getElementById('afm-svg');
  if (svgEl) svgEl.innerHTML = keukenSVG(type, _getDims());
}

window.updateDiagram = type => {
  const el = document.getElementById('afm-svg');
  if (el) el.innerHTML = keukenSVG(type, _getDims());
};

// ── HELPERS ───────────────────────────────────────────────
const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : '';
const v   = id => document.getElementById(id)?.value?.trim() || '';
const err = msg => `<div class="alert alert-err">⚠️ ${msg}</div>`;
const sort = arr => (arr || []).slice().sort((a,b) => a.order_index - b.order_index);
const fmtDate = iso => iso ? new Date(iso).toLocaleDateString('nl-NL', { day:'numeric', month:'short', year:'numeric' }) : '';

router();
</script>
